<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Territory Conquest</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            position: fixed;
            width: 100%;
            height: 100%;
            background: #000;
            font-family: 'Arial', system-ui, sans-serif;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            color: white;
            z-index: 10;
        }
        #menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 20px;
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.9);
        }
        #menu h1 {
            font-size: 2.8rem;
            text-shadow: 0 4px 20px rgba(100, 200, 255, 0.5);
            color: #64c8ff;
        }
        #menu p {
            font-size: 1rem;
            max-width: 500px;
            opacity: 0.8;
            line-height: 1.6;
        }
        .tap {
            font-size: 1.2rem;
            animation: pulse 1.5s infinite;
            margin-top: 20px;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.97); }
        }
        #hud {
            display: none;
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            padding: 10px;
        }
        #timer {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.4rem;
            font-weight: bold;
            color: #64c8ff;
            text-shadow: 0 0 10px rgba(100, 200, 255, 0.5);
            background: rgba(30, 30, 50, 0.9);
            padding: 8px 20px;
            border-radius: 6px;
            border: 1px solid #64c8ff;
            z-index: 20;
            pointer-events: none;
        }
        /* HP shown via overhead healthbar only */
        #territory-display {
            position: absolute;
            top: 70px;
            right: 10px;
            background: rgba(30, 30, 50, 0.9);
            padding: 10px 15px;
            border-radius: 6px;
            color: white;
            font-size: 0.9rem;
            z-index: 20;
            pointer-events: none;
            max-height: 200px;
            overflow-y: auto;
        }
        .territory-stat {
            margin: 3px 0;
            text-align: right;
        }
        #gameover {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 100;
            pointer-events: auto;
        }
        #gameover h2 {
            font-size: 2.5rem;
            color: #64c8ff;
        }
        #gameover p {
            font-size: 1.2rem;
        }
        .stats-box {
            background: rgba(30, 30, 50, 0.8);
            padding: 20px;
            border-radius: 6px;
            border: 1px solid #64c8ff;
            max-width: 500px;
        }
        .stats-box div {
            margin: 8px 0;
            font-size: 1rem;
        }
    </style>
</head>
<body>
<div id="game-container">
    <div id="ui">
        <div id="menu">
            <h1>TERRITORY<br>CONQUEST</h1>
            <p style="font-size:1.1rem;line-height:1.6">Claim the most land or destroy all bases!</p>
            <p style="font-size: 0.85rem; margin-top: 16px; opacity:0.7; line-height:1.5">
                Drag to steer and encircle territory<br>
                Earn resources to upgrade your army
            </p>
            <p class="tap">TAP TO START</p>
        </div>
        <div id="hud">
            <div id="timer">3:00</div>
            <!-- Mute toggle removed -->
            <!-- HP shown on overhead healthbar only -->
            <div id="base-hp-display" style="position:absolute;top:60px;left:10px;color:#ff6666;font-size:0.9rem;font-weight:bold;z-index:20;pointer-events:none;text-shadow:0 0 4px rgba(0,0,0,0.8)">Base HP: 100</div>
            <div id="gold-display" style="position:absolute;top:82px;left:10px;color:#FFD700;font-size:0.9rem;font-weight:bold;z-index:20;pointer-events:none;text-shadow:0 0 4px rgba(0,0,0,0.8)">Gold: 0</div>
            <div id="upgrade-panel" style="position:absolute;bottom:50px;left:10px;z-index:25;pointer-events:auto;cursor:pointer;width:64px;border-radius:8px;overflow:hidden;border:2px solid rgba(255,255,255,0.3);box-shadow:0 2px 8px rgba(0,0,0,0.5);">
                <!-- Card portrait area -->
                <div style="width:64px;height:64px;background:linear-gradient(180deg,#1a1a2e,#0d0d1a);display:flex;align-items:center;justify-content:center;font-size:2.2rem;">
                    🗡
                </div>
                <!-- Card bottom bar: count + upgrade indicator -->
                <div id="upgrade-bar" style="width:64px;height:24px;background:#555;display:flex;align-items:center;justify-content:center;gap:2px;transition:background 0.2s;">
                    <span id="upgrade-arrow" style="display:none;font-size:0.9rem;color:#1a5c1a;">▲</span>
                    <span id="batch-count" style="color:#000;font-size:1rem;font-weight:bold;">1</span>
                </div>
                <div id="upgrade-btn" style="display:none;"></div>
            </div>
            <!-- Skill icons display -->
            <div id="skill-icons" style="position:absolute;bottom:36px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:20;pointer-events:none"></div>
            <!-- EXP bar at bottom with LV above -->
            <div id="level-display" style="position:absolute;bottom:24px;left:50%;transform:translateX(-50%);color:#aa88ff;font-size:0.75rem;font-weight:bold;z-index:20;pointer-events:none;text-shadow:0 0 6px rgba(119,68,255,0.6)">Lv.1</div>
            <div id="exp-bar-container" style="position:absolute;bottom:12px;left:10%;width:80%;height:8px;background:rgba(0,0,0,0.5);border-radius:4px;z-index:20;pointer-events:none">
                <div id="exp-bar-fill" style="width:0%;height:100%;background:linear-gradient(90deg,#7744ff,#aa88ff);border-radius:4px;transition:width 0.2s"></div>
            </div>
            <div id="territory-display"></div>
            <!-- Respawn overlay -->
            <div id="respawn-overlay" style="display:none;position:absolute;inset:0;z-index:50;pointer-events:none;display:none;align-items:center;justify-content:center;flex-direction:column">
                <div id="respawn-count" style="font-size:3rem;font-weight:bold;color:#ff4444;text-shadow:0 0 20px rgba(255,0,0,0.5)">3</div>
                <div id="respawn-text" style="font-size:0.9rem;color:#ff8888;margin-top:8px">RESPAWNING...</div>
            </div>
        </div>
        <div id="gameover">
            <h2 id="result-text">GAME OVER</h2>
            <div class="stats-box">
                <div id="result-stats"></div>
            </div>
            <p class="tap">TAP TO RETRY</p>
        </div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import * as SkeletonUtils from 'three/addons/utils/SkeletonUtils.js';
import * as BufferGeometryUtils from 'three/addons/utils/BufferGeometryUtils.js';

// ═══════════════════════════════════════════════════════════════
// GLTF Asset Preloader
// ═══════════════════════════════════════════════════════════════
const gltfLoader = new GLTFLoader();
const GLTF_CACHE = {}; // key → { scene, animations[], hasSkinnedMesh }

// ── Character model registry ──
// Initial heroes: Casual (male P019 / female P020)
// Skill-path character upgrades:
//   Attack:    Medieval(P020) → SciFi(P020) → Spacesuit(P019)
//   Commander: Suit(P019) → Soldier(P020) → King(P019)
//   Speed:     Punk(P019) → Adventurer(P019) → Witch(P020)
const HERO_INITIAL = [
    { key: 'hero_male',   path: './assets/Casual_2.gltf' },  // P019 male
    { key: 'hero_female', path: './assets/Casual.gltf' },     // P020 female
];
const HERO_SKILL_MODELS = [
    { key: 'attack_t1', path: './assets/Medieval.gltf' },
    { key: 'attack_t2', path: './assets/SciFi.gltf' },
    { key: 'attack_t3', path: './assets/Spacesuit.gltf' },
    // (Greed/Speed models removed)
];
const BASE_MODELS = [
    { key: 'base_t0', path: './assets/Temple_SecondAge_Level1.gltf' },
    { key: 'base_t1', path: './assets/Temple_SecondAge_Level1.gltf' },
    { key: 'base_t2', path: './assets/Temple_SecondAge_Level2.gltf' },
    { key: 'base_t3', path: './assets/Temple_SecondAge_Level3.gltf' },
];
const SOLDIER_MODELS = [
    { key: 'soldier_p1', path: './assets/Cyclops.gltf' },
    { key: 'soldier_p2', path: './assets/Demon.gltf' },
    { key: 'soldier_p3', path: './assets/Skull.gltf' },
    { key: 'soldier_p4', path: './assets/Ghost.gltf' },
];
const MISC_MODELS = [
    { key: 'gold_mine',    path: './assets/Resource_Gold_1.gltf' },
];

async function preloadGLTF() {
    const allModels = [...HERO_INITIAL, ...HERO_SKILL_MODELS, ...BASE_MODELS, ...SOLDIER_MODELS, ...MISC_MODELS];
    const promises = allModels.map(m => new Promise((resolve) => {
        gltfLoader.load(m.path, (gltf) => {
            let hasSkinnedMesh = false;
            gltf.scene.traverse(ch => {
                if (ch.isSkinnedMesh) hasSkinnedMesh = true;
            });
            GLTF_CACHE[m.key] = { scene: gltf.scene, animations: gltf.animations || [], hasSkinnedMesh };
            console.log(`Loaded: ${m.key} (skinned:${hasSkinnedMesh}, anims:${gltf.animations?.length || 0})`);
            resolve();
        }, undefined, (err) => {
            console.error(`Failed to load ${m.key}:`, err);
            resolve();
        });
    }));
    await Promise.all(promises);
    // Pre-compute reference scale for each model (1/height) for consistent sizing
    for (const m of allModels) {
        const cached = GLTF_CACHE[m.key];
        if (!cached) continue;
        const tmpClone = cached.hasSkinnedMesh ? SkeletonUtils.clone(cached.scene) : cached.scene.clone();
        tmpClone.updateMatrixWorld(true);
        const box = new THREE.Box3().setFromObject(tmpClone);
        const size = new THREE.Vector3();
        box.getSize(size);
        GLTF_REF_SCALE[m.key] = size.y > 0 ? (1 / size.y) : 1;
    }
    console.log('All GLTF assets loaded');
}

// Clone a GLTF scene with proper SkinnedMesh handling + create AnimationMixer
function cloneGLTF(key) {
    const cached = GLTF_CACHE[key];
    if (!cached) return null;
    const clone = cached.hasSkinnedMesh ? SkeletonUtils.clone(cached.scene) : cached.scene.clone();
    clone.traverse(ch => { if (ch.isMesh && ch.material) ch.material = ch.material.clone(); });
    return clone;
}

// Create AnimationMixer + action map for a cloned model
function createAnimMixer(model, key) {
    const cached = GLTF_CACHE[key];
    if (!cached || !cached.animations.length) return null;
    const mixer = new THREE.AnimationMixer(model);
    const actions = {};
    for (const clip of cached.animations) {
        actions[clip.name] = mixer.clipAction(clip);
    }
    return { mixer, actions };
}

// Pre-computed reference scale for each GLTF model key (set during preload)
const GLTF_REF_SCALE = {}; // key → scale factor to make model 1 unit tall

// Measure GLTF bounding box and compute scale to target height, centering feet at y=0
function fitToHeight(model, targetH, modelKey) {
    let s;
    if (modelKey && GLTF_REF_SCALE[modelKey]) {
        // Use pre-computed scale for consistency across clones
        s = GLTF_REF_SCALE[modelKey] * targetH;
    } else {
        const box = new THREE.Box3().setFromObject(model);
        const size = new THREE.Vector3();
        box.getSize(size);
        if (size.y <= 0) return 1;
        s = targetH / size.y;
    }
    model.scale.setScalar(s);
    model.updateMatrixWorld(true);
    const box2 = new THREE.Box3().setFromObject(model);
    model.position.y = -box2.min.y;
    return s;
}

// Resolve which hero model key to use based on player skill state
function getHeroModelKey(playerId) {
    const ss = playerSkillStates[playerId];
    if (!ss) return playerId % 2 === 1 ? 'hero_male' : 'hero_female';
    // Use highest tier skill model
    const paths = ['attack'];
    let bestKey = null;
    for (const path of paths) {
        for (let t = 3; t >= 1; t--) {
            const sk = `${path}_t${t}`;
            if (ss.skills.includes(sk)) {
                bestKey = sk;
                break;
            }
        }
        if (bestKey) break;
    }
    return bestKey || (playerId % 2 === 1 ? 'hero_male' : 'hero_female');
}

// === NPC DEBUG LOG — available immediately on page load ===
window._npcLog = { entries: [], maxEntries: 500, enabled: false, elapsed: 0, trackId: 2, logInterval: 1.0 };
window.enableNpcLog = (playerId) => {
    const L = window._npcLog;
    if (playerId !== undefined) L.trackId = playerId;
    L.enabled = true; L.entries = []; L.elapsed = 0;
    console.log(`[NPC LOG] Tracking P${L.trackId} only. Logging every 1s. Call dumpNpcLog() to view.`);
};
window.disableNpcLog = () => { window._npcLog.enabled = false; console.log('[NPC LOG] Disabled.'); };
window.dumpNpcLog = () => { const L = window._npcLog; console.log(`=== NPC P${L.trackId} LOG (${L.entries.length}) ===`); for (const e of L.entries) console.log(e); console.log('=== END ==='); return L.entries; };
window.clearNpcLog = () => { window._npcLog.entries = []; console.log('[NPC LOG] Cleared.'); };
console.log('[NPC LOG] Ready. enableNpcLog() or enableNpcLog(3) to track specific player. dumpNpcLog() to view.');

const CONFIG = {
    mapSize: 200,
    gridSize: 200,
    heroSpeed: 9,
    maxTrailLength: 240,
    turnSpeed: 5,
    gameDuration: 180,
    numPlayers: 4,
    goldMineCount: 0,
    playerColors: [0x4DFFFF, 0xFF1493, 0x00FF41, 0xFFA500],
    startTerritoryRadius: 10,
    baseHP: 40,
    playerHP: 6,
    respawnTime: 3,
    soldierHP: 2,
    soldierDamage: 1,
    soldierAttackCooldown: 1.2,
    baseArrowDamage: 1,
    baseArrowRange: 15,
    baseArrowCooldown: 1.5,
    maxSoldiersPerBase: 80, // soft cap per base — performance ceiling ~320 total soldiers (4 players)
};

// === Base Tier System (T0-T4, auto-upgrades with player level) ===
// === Base (simplified: single tier, no upgrades) ===
const BASE_TIERS = [
    { // T0: fixed base — arrows ×1
        name: 'Watchtower', arrowDmg: 2, arrowRange: 15, arrowCD: 1.5, arrowTargets: 1,
        hasBomb: false, hasSlowZone: false, hasWalls: false,
    },
];

// EXP / Level system: 4 levels per 180s game (roguelike skill tiers)
const MAX_HERO_LEVEL = 4;
const EXP_TABLE = [];
{
    const base = 90, increment = 60;
    let cumulative = 0;
    for (let lv = 1; lv <= MAX_HERO_LEVEL; lv++) {
        const required = base + increment * lv;
        cumulative += required;
        EXP_TABLE.push({ level: lv, required, cumulative });
    }
}

// === Roguelike Skill System: 3 Paths × 3 Tiers ===
const SKILL_PATH = { ATTACK: 'attack' };
const SKILL_DEFS = {
    attack_t1: {
        id: 'attack_t1', path: SKILL_PATH.ATTACK, tier: 1,
        name: 'Blade Rush', icon: '⚔️', desc: 'Melee ATK 2, cleave',
        color: '#ff4444',
    },
    attack_t2: {
        id: 'attack_t2', path: SKILL_PATH.ATTACK, tier: 2,
        name: 'Shotgun', icon: '🔫', desc: '×3 ATK 2 R15',
        color: '#ff4444',
    },
    attack_t3: {
        id: 'attack_t3', path: SKILL_PATH.ATTACK, tier: 3,
        name: 'Bomber', icon: '💣', desc: '2 bombs AOE+fire',
        color: '#ff4444',
    },
};

// Per-player skill state (initialized in setupPlayers)
const playerSkillStates = {}; // keyed by player.id
function initSkillState(playerId) {
    playerSkillStates[playerId] = {
        xp: 0,
        level: 0,
        xpForNext: EXP_TABLE[0].required,
        chosenPath: null,  // set after first skill pick
        skills: [],        // list of skill ids acquired
        pendingCardSelection: false,
        // Attack skill runtime
        heroAttackCooldown: 0,
        attackMode: 'none', // 'none', 'melee', 'ranged', 'bomb'
        // Attack T3 kill buff: attack speed x2 + move +30% for 8s
        killBuffTimer: 0,      // remaining buff duration
        // (Speed path removed)
        // Attack T3: rechargeable shield
        shieldHP: 0,           // current shield HP (max 6)
        shieldMax: 6,          // max shield HP
        shieldRechargeRate: 0.3, // HP/s recharge (full in 20s)
        // (Commander/Greed path removed)
    };
}

function playerGainXP(playerId, amount) {
    const ss = playerSkillStates[playerId];
    if (!ss || ss.level >= MAX_HERO_LEVEL) return;
    ss.xp += amount;
    while (ss.xp >= ss.xpForNext && ss.level < MAX_HERO_LEVEL) {
        ss.xp -= ss.xpForNext;
        ss.level++;
        if (ss.level < MAX_HERO_LEVEL) {
            ss.xpForNext = EXP_TABLE[ss.level].required;
        }
        ss.pendingCardSelection = true;
        if (playerId === 1) {
            // Human: show card UI
            showSkillCardSelection(playerId);
        } else {
            // NPC: auto-select
            npcAutoSelectSkill(playerId);
        }
    }
    if (playerId === 1) updateExpUI();
}

function playerHasSkill(playerId, skillId) {
    const ss = playerSkillStates[playerId];
    return ss && ss.skills.includes(skillId);
}

function getPlayerSkillTier(playerId, path) {
    const ss = playerSkillStates[playerId];
    if (!ss) return 0;
    let maxTier = 0;
    for (const sid of ss.skills) {
        const def = SKILL_DEFS[sid];
        if (def && def.path === path) maxTier = Math.max(maxTier, def.tier);
    }
    return maxTier;
}

// Generate skill card options for a level-up (simplified: Attack path only)
function generateSkillOptions(playerId) {
    const ss = playerSkillStates[playerId];
    if (!ss) return [];
    // Only Attack path: return next tier if available
    const currentTier = getPlayerSkillTier(playerId, SKILL_PATH.ATTACK);
    if (currentTier >= 3) return []; // all 3 tiers acquired, no more skills
    const nextSkillId = SKILL_PATH.ATTACK + '_t' + (currentTier + 1);
    const def = SKILL_DEFS[nextSkillId];
    return def ? [def] : [];
}

// NPC auto-select skill on level-up (simplified: always next Attack tier)
function npcAutoSelectSkill(playerId) {
    const options = generateSkillOptions(playerId);
    if (options.length === 0) return;
    applySkill(playerId, options[0]);
}

const GameState = { MENU: 'menu', PLAYING: 'playing', GAME_OVER: 'gameover' };
const state = {
    current: GameState.MENU,
    timer: CONFIG.gameDuration,
};

// Gold upgrade system — UNLIMITED levels with exponential scaling cost
// Formula: cost = baseCost * (growthRate ^ level)
// Level 0→20, 1→34, 2→58, 3→98, 4→167, 5→283, 6→482, 7→819 ...
// Each level: +2 soldiers per batch
const UPGRADE_BASE_COST = 20;
const UPGRADE_GROWTH_RATE = 1.7; // exponential growth factor
const upgradeState = {
    soldierBatch: 1,       // soldiers spawned per batch (permanent)
    batchLevel: 0,         // current upgrade level (unlimited)
};
// NPC upgrade state: each NPC has own batch level
const npcUpgradeState = {}; // keyed by player.id

function getUpgradeCost(level) {
    return Math.floor(UPGRADE_BASE_COST * Math.pow(UPGRADE_GROWTH_RATE, level));
}

function tryUpgradeBatch() {
    if (!humanPlayer) return;
    const cost = getUpgradeCost(upgradeState.batchLevel);
    if (humanPlayer.gold >= cost) {
        humanPlayer.gold -= cost;
        upgradeState.batchLevel++;
        upgradeState.soldierBatch += 2;
        updateUpgradeUI();
        AudioMgr.upgrade();
        spawnParticles(humanPlayer.base?.x || 0, 5, humanPlayer.base?.z || 0, 0xFFD700, 8);
    }
}

function updateUpgradeUI() {
    const bar = document.getElementById('upgrade-bar');
    const batchEl = document.getElementById('batch-count');
    const arrowEl = document.getElementById('upgrade-arrow');
    if (!bar || !humanPlayer) return;
    if (batchEl) batchEl.textContent = upgradeState.soldierBatch;
    const cost = getUpgradeCost(upgradeState.batchLevel);
    const canAfford = humanPlayer.gold >= cost;
    if (canAfford) {
        // Can upgrade — yellow bar with green arrow
        bar.style.background = '#FFD700';
        if (arrowEl) { arrowEl.style.display = 'inline'; arrowEl.textContent = '▲'; }
    } else {
        // Cannot afford — gray bar, no arrow
        bar.style.background = '#888';
        if (arrowEl) arrowEl.style.display = 'none';
    }
}

// NPC auto-upgrade: called each frame, NPC spends gold to upgrade batch
function npcAutoUpgrade(player) {
    if (player.isHuman) return;
    if (!npcUpgradeState[player.id]) npcUpgradeState[player.id] = { batchLevel: 0, soldierBatch: 1 };
    const st = npcUpgradeState[player.id];
    const cost = getUpgradeCost(st.batchLevel);
    if (player.gold >= cost) {
        player.gold -= cost;
        st.batchLevel++;
        st.soldierBatch += 2;
    }
}

// Shared EXP UI update (human player only)
function updateExpUI() {
    const ss = playerSkillStates[1];
    if (!ss) return;
    const pct = ss.level >= MAX_HERO_LEVEL ? 100 : Math.min(100, (ss.xp / ss.xpForNext) * 100);
    document.getElementById('exp-bar-fill').style.width = pct + '%';
    document.getElementById('level-display').textContent = ss.level >= MAX_HERO_LEVEL
        ? 'Lv.MAX'
        : `Lv.${ss.level + 1}`;
}

function updateSkillIconsUI() {
    const el = document.getElementById('skill-icons');
    if (!el) return;
    const ss = playerSkillStates[1];
    if (!ss) { el.innerHTML = ''; return; }
    el.innerHTML = ss.skills.map(sid => {
        const def = SKILL_DEFS[sid];
        if (!def) return '';
        return `<div style="background:rgba(0,0,0,0.6);border:1px solid ${def.color};border-radius:4px;padding:2px 4px;font-size:0.7rem" title="${def.name}: ${def.desc}">${def.icon}</div>`;
    }).join('');
}

// Determine best hero model: highest tier wins; ties go to first-chosen path
function _getBestModelKey(ss) {
    if (!ss || ss.skills.length === 0) return null;
    // Extract tier from skill id (e.g. 'attack_t2' → tier 2)
    const getTier = (id) => parseInt(id.replace(/.*_t/, '')) || 0;
    const getPath = (id) => id.replace(/_t\d+$/, '');
    // Find max tier across all acquired skills, grouped by path
    const pathMaxTier = {}; // path → max tier
    const pathFirstIdx = {}; // path → first acquisition index
    for (let i = 0; i < ss.skills.length; i++) {
        const id = ss.skills[i];
        const path = getPath(id);
        const tier = getTier(id);
        if (!(path in pathMaxTier) || tier > pathMaxTier[path]) pathMaxTier[path] = tier;
        if (!(path in pathFirstIdx)) pathFirstIdx[path] = i;
    }
    // Pick: highest tier wins; if tied, first-chosen path wins
    let bestPath = null, bestTier = -1, bestIdx = Infinity;
    for (const [path, tier] of Object.entries(pathMaxTier)) {
        if (tier > bestTier || (tier === bestTier && pathFirstIdx[path] < bestIdx)) {
            bestPath = path;
            bestTier = tier;
            bestIdx = pathFirstIdx[path];
        }
    }
    return bestPath ? `${bestPath}_t${bestTier}` : null;
}

// === Apply a skill to a player ===
function applySkill(playerId, skillDef) {
    const ss = playerSkillStates[playerId];
    if (!ss || !skillDef) return;
    ss.skills.push(skillDef.id);
    ss.pendingCardSelection = false;
    // Set chosen path on first pick
    if (!ss.chosenPath) ss.chosenPath = skillDef.path;

    // Instant effects on the hero
    const player = players.find(p => p.id === playerId);
    if (!player) return;

    // (Base tier upgrade removed — stays at T0)

    // (Attack T3 is now Bomber — no shield init needed)
    // Upgrade hero model: show highest tier, first-chosen path wins ties
    if (player.hero) {
        const bestModelKey = _getBestModelKey(ss);
        if (bestModelKey) {
            player.hero.upgradeModel(bestModelKey);
        }
        spawnParticles(player.hero.x, 3, player.hero.z, 0xaa88ff, 12);
    }
    // Update HUD icons for human player
    if (playerId === 1) updateSkillIconsUI();
}

// Heightmap for terrain variation
function generateHeightmap(width, height, scale = 0.3) {
    const canvas = document.createElement('canvas');
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext('2d');

    // Simple Perlin-like noise using canvas gradients
    ctx.fillStyle = '#888888';
    ctx.fillRect(0, 0, width, height);

    // Add some noise variation
    for (let i = 0; i < 50; i++) {
        const x = Math.random() * width;
        const z = Math.random() * height;
        const radius = Math.random() * 30 + 20;
        const grd = ctx.createRadialGradient(x, z, 0, x, z, radius);
        grd.addColorStop(0, `rgba(${Math.random() * 50 + 100}, ${Math.random() * 50 + 100}, ${Math.random() * 50 + 100}, 0.5)`);
        grd.addColorStop(1, 'rgba(100, 100, 100, 0)');
        ctx.fillStyle = grd;
        ctx.fillRect(x - radius, z - radius, radius * 2, radius * 2);
    }

    return canvas;
}

// Terrain types: 0=grass, 1=river, 2=forest (must be before TerritoryGrid)
const TERRAIN = { GRASS: 0, RIVER: 1, FOREST: 2 };
const terrainGrid = new Uint8Array(CONFIG.gridSize * CONFIG.gridSize);

// Territory grid: 0=empty, 1-4=player territory, 11-14=player trail
class TerritoryGrid {
    constructor() {
        this.gridSize = CONFIG.gridSize;
        this.cellSize = CONFIG.mapSize / this.gridSize;
        this.grid = new Int8Array(this.gridSize * this.gridSize);
        this.canvas = document.createElement('canvas');
        this.canvas.width = this.gridSize;
        this.canvas.height = this.gridSize;
        this.ctx = this.canvas.getContext('2d');
        this.texture = new THREE.CanvasTexture(this.canvas);
        this.texture.magFilter = THREE.NearestFilter;
        this.texture.minFilter = THREE.NearestFilter;
        this.redraw();
    }

    getGridCoords(x, z) {
        const gx = Math.floor((x + CONFIG.mapSize / 2) / this.cellSize);
        const gz = Math.floor((z + CONFIG.mapSize / 2) / this.cellSize);
        return { gx, gz };
    }

    isInBounds(gx, gz) {
        return gx >= 0 && gx < this.gridSize && gz >= 0 && gz < this.gridSize;
    }

    getCell(gx, gz) {
        if (!this.isInBounds(gx, gz)) return 0;
        return this.grid[gz * this.gridSize + gx];
    }

    setCell(gx, gz, value) {
        if (!this.isInBounds(gx, gz)) return;
        this.grid[gz * this.gridSize + gx] = value;
    }

    initializeTerritory(playerId, cx, cz) {
        const radius = CONFIG.startTerritoryRadius;
        for (let dx = -radius; dx <= radius; dx++) {
            for (let dz = -radius; dz <= radius; dz++) {
                this.setCell(cx + dx, cz + dz, playerId);
            }
        }
    }

    claimTerritory(playerId, trailCells) {
        if (trailCells.length === 0) return;
        const gs = this.gridSize;

        // Build base protection set: cells within startTerritoryRadius of any base
        const baseProtected = new Set();
        for (const p of players) {
            if (!p.base || p.base.hp <= 0) continue;
            if (p.id === playerId) continue;
            const bc = this.getGridCoords(p.base.x, p.base.z);
            const r = CONFIG.startTerritoryRadius;
            for (let dx = -r; dx <= r; dx++) {
                for (let dz = -r; dz <= r; dz++) {
                    const gx = bc.gx + dx, gz = bc.gz + dz;
                    if (this.isInBounds(gx, gz)) baseProtected.add(gz * gs + gx);
                }
            }
        }

        // Step 1: Convert trail cells to territory + compute bounding box
        const trailVal = 10 + playerId;
        let bbMinX = gs, bbMaxX = 0, bbMinZ = gs, bbMaxZ = 0;

        // Scan all trail cells (including hidden ones) to build bounding box
        for (let i = 0; i < this.grid.length; i++) {
            if (this.grid[i] === trailVal) {
                const gx = i % gs, gz = Math.floor(i / gs);
                if (gx < bbMinX) bbMinX = gx;
                if (gx > bbMaxX) bbMaxX = gx;
                if (gz < bbMinZ) bbMinZ = gz;
                if (gz > bbMaxZ) bbMaxZ = gz;
                if (terrainGrid[i] === TERRAIN.FOREST) {
                    this.grid[i] = 0;
                } else if (baseProtected.has(i)) {
                    let originalOwner = 0;
                    for (const p of players) {
                        if (p.id === playerId || !p.base || p.base.hp <= 0) continue;
                        const bc = this.getGridCoords(p.base.x, p.base.z);
                        if (Math.abs(gx - bc.gx) <= CONFIG.startTerritoryRadius &&
                            Math.abs(gz - bc.gz) <= CONFIG.startTerritoryRadius) {
                            originalOwner = p.id; break;
                        }
                    }
                    this.grid[i] = originalOwner || 0;
                } else {
                    this.grid[i] = playerId;
                }
            }
        }

        // Also expand bounding box to include existing territory connected to trail
        // (the enclosed area could extend beyond the trail's bounding box)
        // Add margin of 4 cells (for safety); if bbox touches map edge, use full-map BFS as fallback
        const MARGIN = 4;
        bbMinX = Math.max(0, bbMinX - MARGIN);
        bbMaxX = Math.min(gs - 1, bbMaxX + MARGIN);
        bbMinZ = Math.max(0, bbMinZ - MARGIN);
        bbMaxZ = Math.min(gs - 1, bbMaxZ + MARGIN);

        // Check if bounding box touches map boundary — if so, use FULL-MAP BFS (safe fallback)
        const touchesEdge = (bbMinX <= 0 || bbMaxX >= gs - 1 || bbMinZ <= 0 || bbMaxZ >= gs - 1);

        // Step 2: Incremental BFS — flood from sub-region boundary (or map edge)
        let claimed = 0;

        if (touchesEdge) {
            // === FALLBACK: Full-map BFS (original algorithm) ===
            const visited = new Uint8Array(gs * gs);
            const queue = [];
            // Seed all map-edge cells that are NOT this player's territory
            for (let x = 0; x < gs; x++) {
                for (const z of [0, gs - 1]) {
                    if (this.grid[z * gs + x] !== playerId) {
                        queue.push(x, z);
                        visited[z * gs + x] = 1;
                    }
                }
            }
            for (let z = 1; z < gs - 1; z++) {
                for (const x of [0, gs - 1]) {
                    if (this.grid[z * gs + x] !== playerId) {
                        queue.push(x, z);
                        visited[z * gs + x] = 1;
                    }
                }
            }
            let head = 0;
            while (head < queue.length) {
                const x = queue[head++], z = queue[head++];
                for (const [nx, nz] of [[x+1,z],[x-1,z],[x,z+1],[x,z-1]]) {
                    if (nx >= 0 && nx < gs && nz >= 0 && nz < gs) {
                        const idx = nz * gs + nx;
                        if (!visited[idx] && this.grid[idx] !== playerId) {
                            visited[idx] = 1;
                            queue.push(nx, nz);
                        }
                    }
                }
            }
            for (let i = 0; i < this.grid.length; i++) {
                if (!visited[i] && this.grid[i] !== playerId && !baseProtected.has(i) &&
                    terrainGrid[i] !== TERRAIN.FOREST) {
                    this.grid[i] = playerId;
                    claimed++;
                }
            }
        } else {
            // === INCREMENTAL BFS: only scan bounding box region ===
            const bw = bbMaxX - bbMinX + 1;
            const bh = bbMaxZ - bbMinZ + 1;
            const visited = new Uint8Array(bw * bh);
            const queue = [];

            // Seed: all cells on the bounding box BORDER that are NOT playerId's territory
            // These represent "outside" — anything not reached by flood is enclosed
            for (let x = bbMinX; x <= bbMaxX; x++) {
                for (const z of [bbMinZ, bbMaxZ]) {
                    const cell = this.grid[z * gs + x];
                    if (cell !== playerId) {
                        const li = (x - bbMinX) + (z - bbMinZ) * bw;
                        if (!visited[li]) { visited[li] = 1; queue.push(x, z); }
                    }
                }
            }
            for (let z = bbMinZ + 1; z < bbMaxZ; z++) {
                for (const x of [bbMinX, bbMaxX]) {
                    const cell = this.grid[z * gs + x];
                    if (cell !== playerId) {
                        const li = (x - bbMinX) + (z - bbMinZ) * bw;
                        if (!visited[li]) { visited[li] = 1; queue.push(x, z); }
                    }
                }
            }

            // BFS within bounding box only
            let head = 0;
            while (head < queue.length) {
                const x = queue[head++], z = queue[head++];
                for (const [nx, nz] of [[x+1,z],[x-1,z],[x,z+1],[x,z-1]]) {
                    if (nx >= bbMinX && nx <= bbMaxX && nz >= bbMinZ && nz <= bbMaxZ) {
                        const li = (nx - bbMinX) + (nz - bbMinZ) * bw;
                        if (!visited[li] && this.grid[nz * gs + nx] !== playerId) {
                            visited[li] = 1;
                            queue.push(nx, nz);
                        }
                    }
                }
            }

            // Claim: unvisited + non-player cells inside bbox = enclosed
            for (let z = bbMinZ; z <= bbMaxZ; z++) {
                for (let x = bbMinX; x <= bbMaxX; x++) {
                    const li = (x - bbMinX) + (z - bbMinZ) * bw;
                    const gi = z * gs + x;
                    if (!visited[li] && this.grid[gi] !== playerId && !baseProtected.has(gi) &&
                        terrainGrid[gi] !== TERRAIN.FOREST) {
                        this.grid[gi] = playerId;
                        claimed++;
                    }
                }
            }
        }

        // Particles for claimed territory (sparse to reduce load)
        if (claimed > 0) {
            const particleChance = Math.min(0.1, 20 / claimed); // cap at ~20 particles
            for (let i = 0; i < this.grid.length; i++) {
                if (this.grid[i] === playerId && Math.random() < particleChance * 0.02) {
                    const gx = i % gs, gz = Math.floor(i / gs);
                    const worldX = (gx - gs / 2) * this.cellSize;
                    const worldZ = (gz - gs / 2) * this.cellSize;
                    spawnParticles(worldX, 1, worldZ, CONFIG.playerColors[playerId - 1], 4);
                }
            }
        }

        // Step 4: Force-restore all base-protected cells to their original owner
        for (const i of baseProtected) {
            if (this.grid[i] === playerId) {
                const gx = i % gs, gz = Math.floor(i / gs);
                for (const p of players) {
                    if (p.id === playerId || !p.base || p.base.hp <= 0) continue;
                    const bc = this.getGridCoords(p.base.x, p.base.z);
                    if (Math.abs(gx - bc.gx) <= CONFIG.startTerritoryRadius &&
                        Math.abs(gz - bc.gz) <= CONFIG.startTerritoryRadius) {
                        this.grid[i] = p.id;
                        break;
                    }
                }
            }
        }

        this.redraw();
        return claimed;
    }

    getTerritoryCount(playerId) {
        let count = 0;
        for (let i = 0; i < this.grid.length; i++) {
            // Only count cells that are actual territory (exclude forest terrain; river CAN be territory)
            if (this.grid[i] === playerId && terrainGrid[i] !== TERRAIN.FOREST) count++;
        }
        return count;
    }

    redraw() {
        // Base: grassland
        this.ctx.fillStyle = '#3a6a2a';
        this.ctx.fillRect(0, 0, this.gridSize, this.gridSize);

        // Draw terrain layer (rivers, forests)
        for (let i = 0; i < terrainGrid.length; i++) {
            const t = terrainGrid[i];
            if (t === TERRAIN.RIVER) {
                const x = i % this.gridSize;
                const z = Math.floor(i / this.gridSize);
                this.ctx.fillStyle = '#1144dd';
                this.ctx.fillRect(x, z, 1, 1);
            } else if (t === TERRAIN.FOREST) {
                const x = i % this.gridSize;
                const z = Math.floor(i / this.gridSize);
                this.ctx.fillStyle = '#1a3a12';
                this.ctx.fillRect(x, z, 1, 1);
            }
        }

        // Draw territory on top (semi-transparent; river cells extra faint)
        for (let i = 0; i < this.grid.length; i++) {
            const val = this.grid[i];
            if (val >= 1 && val <= 4) {
                const x = i % this.gridSize;
                const z = Math.floor(i / this.gridSize);
                const baseColor = CONFIG.playerColors[val - 1];
                const r = (baseColor >> 16) & 0xFF;
                const g = (baseColor >> 8) & 0xFF;
                const b = baseColor & 0xFF;
                const alpha = terrainGrid[i] === TERRAIN.RIVER ? 0.1 : 0.45;
                this.ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
                this.ctx.fillRect(x, z, 1, 1);
            }
        }

        this.texture.needsUpdate = true;
    }
}

const territoryGrid = new TerritoryGrid();

const forestObjects = [];

function generateTerrain() {
    terrainGrid.fill(TERRAIN.GRASS);
    const gs = CONFIG.gridSize;

    // === SINGLE RIVER: one long river crossing the entire map through the middle ===
    {
        // Randomly choose diagonal direction: top-left→bottom-right or top-right→bottom-left
        const diagonal = Math.random() < 0.5;
        let cx, cz;
        const riverWidth = 2;
        // Start from one corner area, end at opposite corner, passing through center
        if (diagonal) {
            // Top-left to bottom-right (roughly)
            cx = 0;
            cz = Math.floor(gs * 0.1 + Math.random() * gs * 0.15); // start near top-left
        } else {
            // Top-right to bottom-left (roughly)
            cx = gs - 1;
            cz = Math.floor(gs * 0.1 + Math.random() * gs * 0.15);
        }
        let angle = diagonal ? 0.6 : (Math.PI - 0.6); // angled toward center
        const maxSteps = gs * 4;
        for (let step = 0; step < maxSteps; step++) {
            // Paint river cells
            for (let w = -riverWidth; w <= riverWidth; w++) {
                const rx = cx + w;
                const rz = cz;
                if (rx >= 0 && rx < gs && rz >= 0 && rz < gs) {
                    terrainGrid[rz * gs + rx] = TERRAIN.RIVER;
                }
                // Also paint perpendicular for width
                const rx2 = cx;
                const rz2 = cz + w;
                if (rx2 >= 0 && rx2 < gs && rz2 >= 0 && rz2 < gs) {
                    terrainGrid[rz2 * gs + rx2] = TERRAIN.RIVER;
                }
            }
            // Meander slightly
            angle += (Math.random() - 0.5) * 0.15;
            // Keep heading generally downward through center
            if (diagonal) {
                angle = Math.max(0.2, Math.min(1.2, angle)); // angled down-right
                cx += Math.round(Math.cos(angle));
                cz += Math.max(1, Math.round(Math.sin(angle)));
            } else {
                angle = Math.max(Math.PI - 1.2, Math.min(Math.PI - 0.2, angle)); // angled down-left
                cx += Math.round(Math.cos(angle));
                cz += Math.max(1, Math.round(Math.sin(angle)));
            }
            cx = Math.max(2, Math.min(gs - 3, cx));
            cz = Math.max(0, Math.min(gs - 1, cz));
            if (cz >= gs - 1) break; // reached bottom edge
        }
    }

    // === FORESTS: AoE-style large woodlines ===
    function paintForest(cx, cz, rx, rz) {
        for (let dx = -rx; dx <= rx; dx++) {
            for (let dz = -rz; dz <= rz; dz++) {
                const nx = dx / rx, nz = dz / rz;
                if (nx * nx + nz * nz > 0.85 + Math.random() * 0.3) continue;
                const gx = cx + dx, gz = cz + dz;
                if (gx >= 1 && gx < gs - 1 && gz >= 1 && gz < gs - 1) {
                    if (terrainGrid[gz * gs + gx] !== TERRAIN.RIVER) {
                        terrainGrid[gz * gs + gx] = TERRAIN.FOREST;
                    }
                }
            }
        }
    }

    // Edge woodlines (8 strips)
    paintForest(Math.floor(gs * 0.35), Math.floor(gs * 0.05), Math.floor(gs * 0.25), 4);
    paintForest(Math.floor(gs * 0.7), Math.floor(gs * 0.08), Math.floor(gs * 0.18), 5);
    paintForest(Math.floor(gs * 0.3), Math.floor(gs * 0.92), Math.floor(gs * 0.2), 5);
    paintForest(Math.floor(gs * 0.65), Math.floor(gs * 0.95), Math.floor(gs * 0.22), 4);
    paintForest(Math.floor(gs * 0.05), Math.floor(gs * 0.4), 4, Math.floor(gs * 0.2));
    paintForest(Math.floor(gs * 0.08), Math.floor(gs * 0.7), 5, Math.floor(gs * 0.15));
    paintForest(Math.floor(gs * 0.93), Math.floor(gs * 0.35), 5, Math.floor(gs * 0.18));
    paintForest(Math.floor(gs * 0.95), Math.floor(gs * 0.65), 4, Math.floor(gs * 0.2));

    // Mid-map patches
    const midPatches = 2 + Math.floor(Math.random() * 2);
    for (let f = 0; f < midPatches; f++) {
        const fx = Math.floor(gs * 0.25 + Math.random() * gs * 0.5);
        const fz = Math.floor(gs * 0.25 + Math.random() * gs * 0.5);
        const sizeX = 12 + Math.floor(Math.random() * 16);
        const sizeZ = 12 + Math.floor(Math.random() * 16);
        paintForest(fx, fz, sizeX, sizeZ);
    }

    // === ROAD NETWORK: clear grass corridors between all 4 bases ===
    const mh = CONFIG.mapSize / 2 - 60;
    const baseGridPositions = [
        territoryGrid.getGridCoords(-mh, -mh), // P1 top-left
        territoryGrid.getGridCoords(mh, -mh),  // P2 top-right
        territoryGrid.getGridCoords(mh, mh),   // P3 bottom-right
        territoryGrid.getGridCoords(-mh, mh),  // P4 bottom-left
    ];

    // Carve road between two grid points (width=4 cells, L-shaped with midpoint)
    function carveRoad(from, to) {
        const roadW = 6;
        // Use L-shape: go horizontal first, then vertical (with randomized midpoint)
        const midX = Math.floor((from.gx + to.gx) / 2 + (Math.random() - 0.5) * 6);
        // Horizontal segment: from.gx → midX at from.gz
        const xStart = Math.min(from.gx, midX), xEnd = Math.max(from.gx, midX);
        for (let x = xStart; x <= xEnd; x++) {
            for (let w = -roadW; w <= roadW; w++) {
                const gz = from.gz + w;
                if (x >= 0 && x < gs && gz >= 0 && gz < gs) {
                    if (terrainGrid[gz * gs + x] === TERRAIN.FOREST) {
                        terrainGrid[gz * gs + x] = TERRAIN.GRASS;
                    }
                }
            }
        }
        // Vertical segment: from.gz → to.gz at midX
        const zStart = Math.min(from.gz, to.gz), zEnd = Math.max(from.gz, to.gz);
        for (let z = zStart; z <= zEnd; z++) {
            for (let w = -roadW; w <= roadW; w++) {
                const gx = midX + w;
                if (gx >= 0 && gx < gs && z >= 0 && z < gs) {
                    if (terrainGrid[z * gs + gx] === TERRAIN.FOREST) {
                        terrainGrid[z * gs + gx] = TERRAIN.GRASS;
                    }
                }
            }
        }
        // Horizontal segment: midX → to.gx at to.gz
        const x2Start = Math.min(midX, to.gx), x2End = Math.max(midX, to.gx);
        for (let x = x2Start; x <= x2End; x++) {
            for (let w = -roadW; w <= roadW; w++) {
                const gz = to.gz + w;
                if (x >= 0 && x < gs && gz >= 0 && gz < gs) {
                    if (terrainGrid[gz * gs + x] === TERRAIN.FOREST) {
                        terrainGrid[gz * gs + x] = TERRAIN.GRASS;
                    }
                }
            }
        }
    }

    // Carve roads between all adjacent bases + cross connections
    carveRoad(baseGridPositions[0], baseGridPositions[1]); // P1-P2 top
    carveRoad(baseGridPositions[2], baseGridPositions[3]); // P3-P4 bottom
    carveRoad(baseGridPositions[0], baseGridPositions[3]); // P1-P4 left
    carveRoad(baseGridPositions[1], baseGridPositions[2]); // P2-P3 right
    // Also carve a center cross road for mid-map access
    const center = { gx: Math.floor(gs / 2), gz: Math.floor(gs / 2) };
    for (const bp of baseGridPositions) carveRoad(bp, center);

    // Post-process: remove small forest fragments (< 20 cells)
    {
        const visited = new Uint8Array(gs * gs);
        for (let i = 0; i < gs * gs; i++) {
            if (terrainGrid[i] !== TERRAIN.FOREST || visited[i]) continue;
            const cluster = [];
            const q = [i];
            visited[i] = 1;
            while (q.length > 0) {
                const ci = q.pop();
                cluster.push(ci);
                const cx = ci % gs, cz = Math.floor(ci / gs);
                for (const [nx, nz] of [[cx+1,cz],[cx-1,cz],[cx,cz+1],[cx,cz-1]]) {
                    if (nx >= 0 && nx < gs && nz >= 0 && nz < gs) {
                        const ni = nz * gs + nx;
                        if (!visited[ni] && terrainGrid[ni] === TERRAIN.FOREST) {
                            visited[ni] = 1;
                            q.push(ni);
                        }
                    }
                }
            }
            if (cluster.length < 80) {
                for (const ci of cluster) terrainGrid[ci] = TERRAIN.GRASS;
            }
        }
    }

    // Clear terrain around base positions (radius 8 cells)
    const basePositions = [
        { x: -mh, z: -mh }, { x: mh, z: -mh },
        { x: mh, z: mh }, { x: -mh, z: mh }
    ];
    for (const bp of basePositions) {
        const bc = territoryGrid.getGridCoords(bp.x, bp.z);
        for (let dx = -16; dx <= 16; dx++) {
            for (let dz = -16; dz <= 16; dz++) {
                const gx = bc.gx + dx, gz = bc.gz + dz;
                if (gx >= 0 && gx < gs && gz >= 0 && gz < gs) {
                    terrainGrid[gz * gs + gx] = TERRAIN.GRASS;
                }
            }
        }
    }
}

function getTerrainAt(worldX, worldZ) {
    const coords = territoryGrid.getGridCoords(worldX, worldZ);
    if (!territoryGrid.isInBounds(coords.gx, coords.gz)) return TERRAIN.GRASS;
    return terrainGrid[coords.gz * CONFIG.gridSize + coords.gx];
}

function spawnForestObjects() {
    // Clear old
    for (const obj of forestObjects) scene.remove(obj);
    forestObjects.length = 0;
    const gs = CONFIG.gridSize;
    const cs = CONFIG.mapSize / gs;

    // Collect tree positions first
    const treePositions = [];
    for (let gz = 0; gz < gs; gz += 4) {
        for (let gx = 0; gx < gs; gx += 4) {
            if (terrainGrid[gz * gs + gx] !== TERRAIN.FOREST) continue;
            if (Math.random() > 0.45) continue;
            const wx = (gx - gs / 2) * cs + (Math.random() - 0.5) * cs;
            const wz = (gz - gs / 2) * cs + (Math.random() - 0.5) * cs;
            const sy = 0.7 + Math.random() * 0.6;
            treePositions.push({ x: wx, z: wz, sy });
        }
    }

    if (treePositions.length === 0) return;

    // InstancedMesh for trunks
    const trunkGeo = new THREE.CylinderGeometry(0.3, 0.4, 3, 5);
    const trunkMat = new THREE.MeshLambertMaterial({ color: 0x5C3A1E });
    const trunkMesh = new THREE.InstancedMesh(trunkGeo, trunkMat, treePositions.length);
    // InstancedMesh for foliage
    const foliageGeo = new THREE.ConeGeometry(2, 4, 6);
    const foliageMat = new THREE.MeshLambertMaterial({ color: 0x1B5E20 });
    const foliageMesh = new THREE.InstancedMesh(foliageGeo, foliageMat, treePositions.length);

    const dummy = new THREE.Object3D();
    for (let i = 0; i < treePositions.length; i++) {
        const t = treePositions[i];
        const sx = 0.8 + Math.random() * 0.4;
        // Trunk
        dummy.position.set(t.x, 1.5 * t.sy, t.z);
        dummy.scale.set(sx, t.sy, sx);
        dummy.updateMatrix();
        trunkMesh.setMatrixAt(i, dummy.matrix);
        // Foliage
        dummy.position.set(t.x, 4.5 * t.sy, t.z);
        dummy.scale.set(sx, t.sy, sx);
        dummy.updateMatrix();
        foliageMesh.setMatrixAt(i, dummy.matrix);
    }
    trunkMesh.instanceMatrix.needsUpdate = true;
    foliageMesh.instanceMatrix.needsUpdate = true;
    scene.add(trunkMesh);
    scene.add(foliageMesh);
    forestObjects.push(trunkMesh, foliageMesh);
}

const mapHalf = CONFIG.mapSize / 2;

// Base collision helper: returns true if (x,z) is inside any base's collision radius
// ignorePlayerIds can be a single id or an array of ids to skip
const BASE_COLLISION_RADIUS = 4.5;
function isInsideBase(x, z, ignorePlayerIds) {
    const ignore = Array.isArray(ignorePlayerIds) ? ignorePlayerIds : (ignorePlayerIds !== undefined ? [ignorePlayerIds] : []);
    for (const p of players) {
        if (!p.base || p.base.hp <= 0) continue;
        if (ignore.includes(p.id)) continue;
        const dx = x - p.base.x, dz = z - p.base.z;
        if (dx * dx + dz * dz < BASE_COLLISION_RADIUS * BASE_COLLISION_RADIUS) return true;
    }
    return false;
}
// Push entity out of base collision (returns adjusted x,z)
function resolveBaseCollision(x, z, prevX, prevZ, ignorePlayerIds) {
    if (!isInsideBase(x, z, ignorePlayerIds)) return { x, z };
    if (!isInsideBase(x, prevZ, ignorePlayerIds)) return { x, z: prevZ };
    if (!isInsideBase(prevX, z, ignorePlayerIds)) return { x: prevX, z };
    return { x: prevX, z: prevZ };
}

class GoldMine {

        this.z = z;

        if (gltfModel) {
            this.mesh = new THREE.Group();
            this.mesh.add(gltfModel);
            fitToHeight(gltfModel, 3.5); // visible but not oversized
            gltfModel.traverse(ch => {
                if (ch.isMesh) {
                    ch.material.emissive = new THREE.Color(0xFFAA00);
                    ch.material.emissiveIntensity = 0.3;

                    ch.receiveShadow = true;

        }

        );

        }

        if (this.owningPlayerId !== null) {

            if (this.goldAccumulator >= 1.0) {
                this.goldAccumulator = 0;
