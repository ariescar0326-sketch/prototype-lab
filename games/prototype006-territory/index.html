                    if (hero.trail.length === 0 && player.aiState !== null && player.aiWpIdx > 0 && !hero.isOutside && player.aiWentOutside) {
                        _addLog(`TRAIL LIMIT RESET (trail erased by maxTrailLength) → reset AI`);
                        player.aiState = null;
                        player.aiPlanCooldown = 0.5;
                    }

                    // STUCK DETECTION: if hero barely moves over 2 seconds, abort and try escape
                    if (!player.aiStuckCheck) {
                        player.aiStuckCheck = { x: hero.x, z: hero.z, timer: 0, stuckCount: 0 };
                    }
                    player.aiStuckCheck.timer += dt;
                    if (player.aiStuckCheck.timer >= 2) {
                        const sdx = hero.x - player.aiStuckCheck.x;
                        const sdz = hero.z - player.aiStuckCheck.z;
                        const movedDist = Math.sqrt(sdx * sdx + sdz * sdz);
                        // Adjust stuck threshold for river (0.2x speed → lower distance expected)
                        const onRiver = getTerrainAt(hero.x, hero.z) === TERRAIN.RIVER;
                        const stuckThreshold = onRiver ? 1.0 : 4;
                        if (movedDist < stuckThreshold) {
                            player.aiStuckCheck.stuckCount = (player.aiStuckCheck.stuckCount || 0) + 1;
                            _addLog(`STUCK #${player.aiStuckCheck.stuckCount} (moved ${movedDist.toFixed(1)} in 2s) → erase trail & escape`);
                            // Erase trail, restore original cells, reset AI
                            const eraseVal = 10 + player.id;
                            for (let i = 0; i < territoryGrid.grid.length; i++) {
                                if (territoryGrid.grid[i] === eraseVal) {
                                    territoryGrid.grid[i] = hero.trailOriginal.has(i) ? hero.trailOriginal.get(i) : 0;
                                }
                            }
                            hero.trailOriginal.clear();
                            territoryGrid.redraw();
                            hero.trail = [];
                            hero.trailPositions = [];
                            hero.isOutside = false;
                            hero.updateTrailVisual();
                            player.aiState = null;
                            player.aiPlanCooldown = 0.8;
                            // Escape strategy: alternate between random direction and base direction
                            if (player.aiStuckCheck.stuckCount % 2 === 1) {
                                // Random direction to escape local obstacle
                                const rndAng = Math.random() * Math.PI * 2;
                                player.aiMoveX = Math.sin(rndAng);
                                player.aiMoveZ = -Math.cos(rndAng);
                            } else {
                                // Push toward base
                                player.aiMoveX = player.baseX - hero.x;
                                player.aiMoveZ = player.baseZ - hero.z;
                                const ud = Math.sqrt(player.aiMoveX**2 + player.aiMoveZ**2);
                                if (ud > 0) { player.aiMoveX /= ud; player.aiMoveZ /= ud; }
                            }
                            // Also trigger a backtrack to push away from obstacle
                            player.aiBacktrackTimer = 1.0;
                            player.aiBacktrackDX = player.aiMoveX;
                            player.aiBacktrackDZ = player.aiMoveZ;
                        } else {
                            // Moving OK — reset stuck counter
                            player.aiStuckCheck.stuckCount = 0;
                        }
                        player.aiStuckCheck = { x: hero.x, z: hero.z, timer: 0, stuckCount: player.aiStuckCheck.stuckCount };
                    }

                    // Clamp to map edges
                    const limit = CONFIG.mapSize / 2 - 5;
                    if (Math.abs(hero.x) > limit || Math.abs(hero.z) > limit) {
                        player.aiMoveX = -hero.x * 0.1;
                        player.aiMoveZ = -hero.z * 0.1;
                        const m = Math.sqrt(player.aiMoveX ** 2 + player.aiMoveZ ** 2);
                        if (m > 0) { player.aiMoveX /= m; player.aiMoveZ /= m; }
                    }

                    if (_logThisTick) {
                        _addLog(`MOVE dir=(${player.aiMoveX.toFixed(2)},${player.aiMoveZ.toFixed(2)}) target=${targetX!==undefined?`(${targetX.toFixed(1)},${targetZ.toFixed(1)})`:'none'}`);
                    }
                    hero.update(dt, player.aiMoveX, player.aiMoveZ);
                }
            } else {
                // Respawn handled in player.update()

            }
        }

        // Combat system
        checkCombat(dt);
        updateHeroAttacks(dt);

        // Update bomb projectiles
        for (let i = bombProjectiles.length - 1; i >= 0; i--) {
            if (!bombProjectiles[i].update(dt)) {
                bombProjectiles[i].remove();
                bombProjectiles.splice(i, 1);
            }
        }

        // Update fire zones (Attack T3 lingering fire)
        for (let i = fireZones.length - 1; i >= 0; i--) {
            if (!fireZones[i].update(dt)) {
                fireZones[i].remove();
                fireZones.splice(i, 1);
            }
        }

        // (Bunker update loop removed — replaced by Commander T3 Airdrop)

        // Update soldiers (recycle dead ones via pool)
        // Build eliminated set once per frame (O(4) instead of O(4*N) per-soldier find)
        const _eliminatedIds = new Set();
        for (const p of players) {
            if (p.eliminated || !p.base || p.base.hp <= 0) _eliminatedIds.add(p.id);
        }
        for (let i = soldiers.length - 1; i >= 0; i--) {
            const s = soldiers[i];
            if (_eliminatedIds.has(s.playerId)) {
                soldierPool.recycle(s);
                soldiers.splice(i, 1);
                continue;
            }
            if (!s.update(dt)) {
                soldierPool.recycle(s);
                soldiers.splice(i, 1);
            }
        }
        // Batch-update all soldier positions via InstancedMesh (4 draw calls total)
        updateSoldierInstances();
        updateBuffIcons();

        // Check base death for all players (handles bases killed by soldiers, arrows, etc.)
        for (const player of players) {
            if (player.base && player.base.hp <= 0 && !player.eliminated) {
                const bx = player.base.x, bz = player.base.z;
                const deadBase = player.base;
                // Explosion effect
                if (player.base.group) player.base.group.visible = false;
                player.base.healthBar.remove();
                for (let ei = 0; ei < 5; ei++) {
                    const ey = 2 + ei * 3;
                    const delay = ei * 0.08;
                    setTimeout(() => {
                        spawnParticles(bx + (Math.random()-0.5)*4, ey, bz + (Math.random()-0.5)*4, 0xFF2200, 25);
                        spawnParticles(bx + (Math.random()-0.5)*3, ey+1, bz + (Math.random()-0.5)*3, 0xFFAA00, 20);
                        spawnParticles(bx, ey+2, bz, 0xFFFF00, 15);
                    }, delay * 1000);
                }
                spawnParticles(bx, 1, bz, player.color, 30);
                player.base = null;
                // Kill hero permanently
                if (player.hero) {
                    // Restore trail cells
                    const trailVal = 10 + player.id;
                    for (let i = 0; i < territoryGrid.grid.length; i++) {
                        if (territoryGrid.grid[i] === trailVal) {
                            territoryGrid.grid[i] = (player.hero.trailOriginal && player.hero.trailOriginal.has(i))
                                ? player.hero.trailOriginal.get(i) : 0;
                        }
                    }
                    player.hero.remove();
                    player.hero = null;
                }
                player.respawnTimer = 0;
                player.eliminated = true;
                // Kill all soldiers
                for (let si = soldiers.length - 1; si >= 0; si--) {
                    if (soldiers[si].playerId === player.id) {
                        soldierPool.recycle(soldiers[si]);
                        soldiers.splice(si, 1);
                    }
                }
                // Invalidate targets pointing at dead base
                for (const s of soldiers) {
                    if (s.target && s.target.entity === deadBase) {
                        s.target = null; s.inCombat = false;
                    }
                }
                // Erase all territory
                for (let i = 0; i < territoryGrid.grid.length; i++) {
                    const v = territoryGrid.grid[i];
                    if (v === player.id || v === 10 + player.id) territoryGrid.grid[i] = 0;
                }
                territoryGrid.redraw();
                // Human base destroyed → spectator mode (0.5s delay)
                if (player.isHuman) {
                    setTimeout(() => {
                        renderer.domElement.style.filter = 'grayscale(0.5) brightness(0.8)';
                        const ro = document.getElementById('respawn-overlay');
                        ro.style.display = 'flex';
                        document.getElementById('respawn-count').textContent = '💀';
                        document.getElementById('respawn-count').style.color = '#888';
                        document.getElementById('respawn-text').textContent = 'DEFEATED — SPECTATING';
                    }, 500);
                }
            }
        }

        // Check hero death for all players
        for (const player of players) {
            if (player.hero && player.hero.hp <= 0) {
                const deadHero = player.hero;
                // === STACKABLE KILL BUFFS (Attack path) ===
                if (deadHero.lastDamagedByPlayerId > 0 && deadHero.lastDamagedByPlayerId !== player.id) {
                    const killerId = deadHero.lastDamagedByPlayerId;
                    const killerSS = playerSkillStates[killerId];
                    const killer = players.find(p => p.id === killerId);

                    // T1 buff: enemy respawn time x2
                    if (killerSS && killerSS.skills.includes('attack_t1')) {
                        player.respawnTimeMult = (player.respawnTimeMult || 1) * 2;
                    }

                    // T2 buff: territory conversion radius 10 around death point
                    if (killerSS && killerSS.skills.includes('attack_t2')) {
                        const deathGC = territoryGrid.getGridCoords(deadHero.x, deadHero.z);
                        const convertRadius = 10;
                        let converted = 0;
                        for (let dx = -convertRadius; dx <= convertRadius; dx++) {
                            for (let dz = -convertRadius; dz <= convertRadius; dz++) {
                                if (dx*dx + dz*dz > convertRadius*convertRadius) continue;
                                const gx = deathGC.gx + dx, gz = deathGC.gz + dz;
                                if (!territoryGrid.isInBounds(gx, gz)) continue;
                                const cell = territoryGrid.getCell(gx, gz);
                                // Convert victim's territory to killer's (100% within radius)
                                if (cell === player.id) {
                                    territoryGrid.setCell(gx, gz, killerId);
                                    converted++;
                                }
                            }
                        }
                        if (converted > 0 && killer) {
                            spawnParticles(deadHero.x, 2, deadHero.z, killer.color, 20);
                        }
                    }

                    // T3 buff: instant shield recharge on hero kill + killBuff 8s
                    if (killerSS && killerSS.skills.includes('attack_t3')) {
                        killerSS.shieldHP = killerSS.shieldMax; // full shield recharge
                        killerSS.killBuffTimer = 8.0; // attack speed + move buff
                        // VFX: shield recharge flash on killer
                        if (killer && killer.hero) {
                            spawnParticles(killer.hero.x, 3, killer.hero.z, 0x44AAFF, 25);
                            spawnParticles(killer.hero.x, 2, killer.hero.z, 0xFFAA00, 15);
                        }
                    }

                    // General kill VFX
                    if (killer) spawnParticles(deadHero.x, 2, deadHero.z, killer.color, 15);
                }
                // Hero died! Restore trail cells to original values, remove hero
                const trailVal = 10 + player.id;
                for (let i = 0; i < territoryGrid.grid.length; i++) {
                    if (territoryGrid.grid[i] === trailVal) {
                        territoryGrid.grid[i] = (deadHero.trailOriginal && deadHero.trailOriginal.has(i))
                            ? deadHero.trailOriginal.get(i) : 0;
                    }
                }
                territoryGrid.redraw();
                deadHero.remove();
                player.hero = null;
                // Only respawn if base alive and not eliminated
                if (player.base && player.base.hp > 0 && !player.eliminated) {
                    const respawnMult = player.respawnTimeMult || 1;
                    player.respawnTimer = CONFIG.respawnTime * respawnMult;
                    player.respawnTimeMult = 1; // reset after use
                }
                spawnParticles(player.baseX, 2, player.baseZ, player.color, 12);
                if (player.isHuman && !player.eliminated) {
                    setTimeout(() => {
                        playSound('defeat', 0.3, 250);
                        renderer.domElement.style.filter = 'grayscale(0.8) brightness(0.7)';
                        document.getElementById('respawn-overlay').style.display = 'flex';
                    }, 500); // 0.5s delay so player can see death
                }
            }
        }

        // Update HUD
        if (humanPlayer) {
            // Base HP
            if (humanPlayer.base && humanPlayer.base.hp > 0) {
                document.getElementById('base-hp-display').textContent = `🏰 ${Math.ceil(humanPlayer.base.hp)}`;
            } else {
                document.getElementById('base-hp-display').textContent = '🏰 DESTROYED';
            }
            // Territory-based gold income: 1% territory = 1 gold/sec (human only)
            // X% territory → X gold/sec (e.g., 5% = 5 gold/s), leader gets x2
            const humanTerritoryPercent = (territoryGrid.getTerritoryCount(humanPlayer.id) / (CONFIG.gridSize * CONFIG.gridSize)) * 100;
            const goldMult = (humanPlayer.id === territoryLeaderId) ? 2 : 1;
            humanPlayer.gold += humanTerritoryPercent * goldMult * dt;

            // Gold display + upgrade button
            document.getElementById('gold-display').textContent = `💰 ${Math.floor(humanPlayer.gold)}`;
            updateUpgradeUI();

            // Gold income notification fade-out
            if (goldNotifTimer > 0) {
                goldNotifTimer -= dt;
                if (goldNotifTimer <= 0) {
                    const el = document.getElementById('gold-income-notif');
                    if (el) el.style.opacity = '0';
                }
            }
            // Respawn overlay management (skip if eliminated — spectator mode active)
            if (humanPlayer.eliminated) {
                // Clean spectator mode — no countdown, just grayscale observation
                document.getElementById('respawn-overlay').style.display = 'flex';
                document.getElementById('respawn-count').textContent = '💀';
                document.getElementById('respawn-count').style.color = '#888';
                document.getElementById('respawn-text').textContent = 'DEFEATED — SPECTATING';
                renderer.domElement.style.filter = 'grayscale(0.5) brightness(0.8)';
            } else if (!humanPlayer.hero && humanPlayer.respawnTimer > 0) {
                const rt = Math.ceil(humanPlayer.respawnTimer);
                document.getElementById('respawn-count').textContent = rt;
                document.getElementById('respawn-count').style.color = '#ff4444';
                document.getElementById('respawn-overlay').style.display = 'flex';
                renderer.domElement.style.filter = 'grayscale(0.8) brightness(0.7)';
            } else if (humanPlayer.hero) {
                document.getElementById('respawn-overlay').style.display = 'none';
                renderer.domElement.style.filter = '';
            }
        }

        updateTerritoryDisplay();

        // NPC territory-based gold income + auto upgrade
        const totalCells = CONFIG.gridSize * CONFIG.gridSize;
        for (const player of players) {
            if (!player.isHuman && player.base && player.base.hp > 0) {
                const npcTerritoryPercent = (territoryGrid.getTerritoryCount(player.id) / totalCells) * 100;
                const npcGoldMult = (player.id === territoryLeaderId) ? 2 : 1;
                player.gold += npcTerritoryPercent * npcGoldMult * dt;
                npcAutoUpgrade(player);
            }
        }

        // Update particles
        for (let i = particles.length - 1; i >= 0; i--) {
            if (!particles[i].update(dt)) {
                particles[i].remove();
                particles.splice(i, 1);
            }
        }

        // Update score popups
        for (let i = scorePopups.length - 1; i >= 0; i--) {
            if (!scorePopups[i].update(dt)) {
                scorePopups[i].remove();
                scorePopups.splice(i, 1);
            }
        }

        // Update arrow projectiles
        for (let i = arrowProjectiles.length - 1; i >= 0; i--) {
            if (!arrowProjectiles[i].update(dt)) {
                arrowProjectiles[i].remove();
                arrowProjectiles.splice(i, 1);
            }
        }

        checkGameOver();
    }

    // Update camera — follow human hero, spectate NPC in debug mode, or spectate on death
    if (camera && humanPlayer) {
        let camTarget = null;
        if (window.npcDebug) {
            // Debug mode: follow selected NPC (cycle with N key or tap bottom-right)
            if (!window.debugNpcIdx) window.debugNpcIdx = 0;
            const npcs = players.filter(p => !p.isHuman && p.hero);
            if (npcs.length > 0) {
                window.debugNpcIdx = window.debugNpcIdx % npcs.length;
                const npc = npcs[window.debugNpcIdx];
                camTarget = { x: npc.hero.x, z: npc.hero.z };
            }
        } else if (humanPlayer.hero) {
            camTarget = { x: humanPlayer.hero.x, z: humanPlayer.hero.z };
        } else {
            // Spectator: follow first surviving NPC hero, or their base
            for (const p of players) {
                if (p.isHuman) continue;
                if (p.hero) { camTarget = { x: p.hero.x, z: p.hero.z }; break; }
                if (p.base && p.base.hp > 0) { camTarget = { x: p.base.x, z: p.base.z }; break; }
            }
        }
        if (camTarget) {
            camera.position.set(camTarget.x, 30, camTarget.z + 30);
            camera.lookAt(camTarget.x, 0, camTarget.z);
        }
    }

    // === NPC DEBUG VISUALIZATION ===
    if (window.npcDebug) {
        // Clean up old debug visuals
        if (!window.debugLines) window.debugLines = [];
        for (const obj of window.debugLines) { scene.remove(obj); obj.geometry?.dispose(); }
        window.debugLines = [];

        for (const player of players) {
            if (player.isHuman || !player.hero) continue;
            const hero = player.hero;
            const color = player.color;

            // Draw waypoint path
            if (player.aiWaypoints && player.aiWaypoints.length > 0) {
                const wpPts = [new THREE.Vector3(hero.x, 3, hero.z)];
                for (const wp of player.aiWaypoints) {
                    wpPts.push(new THREE.Vector3(wp.x, 3, wp.z));
                }
                // Add base as final destination
                wpPts.push(new THREE.Vector3(player.baseX, 3, player.baseZ));
                const geo = new THREE.BufferGeometry().setFromPoints(wpPts);
                const mat = new THREE.LineBasicMaterial({ color, linewidth: 2 });
                const line = new THREE.Line(geo, mat);
                scene.add(line);
                window.debugLines.push(line);

                // Draw waypoint markers (current = big, done = small, pending = medium)
                for (let wi = 0; wi < player.aiWaypoints.length; wi++) {
                    const wp = player.aiWaypoints[wi];
                    const size = wi < player.aiWpIdx ? 0.3 : (wi === player.aiWpIdx ? 1.0 : 0.6);
                    const markerColor = wi < player.aiWpIdx ? 0x666666 : (wi === player.aiWpIdx ? 0xFFFFFF : color);
                    const marker = new THREE.Mesh(
                        new THREE.SphereGeometry(size, 6, 6),
                        new THREE.MeshBasicMaterial({ color: markerColor })
                    );
                    marker.position.set(wp.x, 3, wp.z);
                    scene.add(marker);
                    window.debugLines.push(marker);
                }
            }
        }

        // HUD debug overlay
        let debugEl = document.getElementById('npc-debug-overlay');
        if (!debugEl) {
            debugEl = document.createElement('div');
            debugEl.id = 'npc-debug-overlay';
            debugEl.style.cssText = 'position:absolute;top:60px;left:8px;color:#fff;font-size:11px;font-family:monospace;background:rgba(0,0,0,0.6);padding:6px 10px;border-radius:6px;z-index:100;pointer-events:none;white-space:pre;';
            document.getElementById('ui').appendChild(debugEl);
        }
        const npcs = players.filter(p => !p.isHuman && p.hero);
        const followIdx = (window.debugNpcIdx || 0) % Math.max(1, npcs.length);
        const followP = npcs[followIdx];
        let dbgTxt = `NPC DEBUG [D:toggle N:cycle]  Following: P${followP ? followP.id : '?'}\n`;
        for (const player of players) {
            if (player.isHuman || !player.hero) continue;
            const hero = player.hero;
            const elapsed = ((player.aiClaimStart || state.timer) - state.timer).toFixed(1);
            const arrow = (followP && player.id === followP.id) ? '►' : ' ';
            dbgTxt += `${arrow}P${player.id} [${player.aiStrategy || 'idle'}] wp:${player.aiWpIdx || 0}/${(player.aiWaypoints||[]).length} trail:${hero.trail.length} t:${elapsed}s\n`;
        }
        debugEl.textContent = dbgTxt;
    } else {
        // Remove debug overlay when off
        const debugEl = document.getElementById('npc-debug-overlay');
        if (debugEl) debugEl.remove();
        if (window.debugLines) {
            for (const obj of window.debugLines) { scene.remove(obj); obj.geometry?.dispose(); }
            window.debugLines = [];
        }
    }

    renderer.render(scene, camera);
});

// Toggle NPC debug with 'D' key, cycle NPC with 'N' key
// Triple-tap top-right to toggle, tap bottom-right to cycle NPC
document.addEventListener('keydown', (e) => {
    if (e.key === 'd' || e.key === 'D') {
        window.npcDebug = !window.npcDebug;
        if (!window.npcDebug) window.debugNpcIdx = 0;
    }
    if ((e.key === 'n' || e.key === 'N') && window.npcDebug) {
        window.debugNpcIdx = (window.debugNpcIdx || 0) + 1;
    }
});
let debugTapCount = 0, debugTapTimer = 0;
document.addEventListener('touchstart', (e) => {
    const touch = e.touches[0];
    // Triple-tap top-right: toggle debug
    if (touch.clientX > window.innerWidth * 0.8 && touch.clientY < window.innerHeight * 0.1) {
        debugTapCount++;
        clearTimeout(debugTapTimer);
        debugTapTimer = setTimeout(() => { debugTapCount = 0; }, 600);
        if (debugTapCount >= 3) {
            window.npcDebug = !window.npcDebug;
            if (!window.npcDebug) window.debugNpcIdx = 0;
            debugTapCount = 0;
        }
    }
    // Tap bottom-right: cycle NPC in debug mode
    if (window.npcDebug && touch.clientX > window.innerWidth * 0.8 && touch.clientY > window.innerHeight * 0.9) {
        window.debugNpcIdx = (window.debugNpcIdx || 0) + 1;
    }
});

window.addEventListener('resize', () => {
    if (camera) {
        const w = window.innerWidth;
        const h = window.innerHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
    }
});

showScreen('menu');
</script>
</body>
</html>
