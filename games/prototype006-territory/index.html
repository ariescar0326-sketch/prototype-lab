}

const goldMines = [];

function isGoldMineSafe(x, z) {
    // Must be on grass
    if (getTerrainAt(x, z) !== TERRAIN.GRASS) return false;
    // Check 4-cell radius for forests and rivers
    const checkR = 4;
    const cs = CONFIG.mapSize / CONFIG.gridSize;
    for (let dx = -checkR; dx <= checkR; dx++) {
        for (let dz = -checkR; dz <= checkR; dz++) {
            const t = getTerrainAt(x + dx * cs, z + dz * cs);
            if (t === TERRAIN.FOREST || t === TERRAIN.RIVER) return false;
        }
    }
    // Must be far from all bases (>30 world units)
    const mh = CONFIG.mapSize / 2 - 60;
    const basePos = [[-mh,-mh],[mh,-mh],[mh,mh],[-mh,mh]];
    for (const [bx, bz] of basePos) {
        const ddx = x - bx, ddz = z - bz;
        if (Math.sqrt(ddx*ddx + ddz*ddz) < 30) return false;
    }
    // Must be far from other gold mines (>20 world units)
    for (const m of goldMines) {
        const ddx = x - m.x, ddz = z - m.z;
        if (Math.sqrt(ddx*ddx + ddz*ddz) < 20) return false;
    }
    return true;
}

function spawnGoldMines() {
    for (let i = 0; i < CONFIG.goldMineCount; i++) {
        let x, z, attempts = 0;
        do {
            x = (Math.random() - 0.5) * CONFIG.mapSize * 0.7;
            z = (Math.random() - 0.5) * CONFIG.mapSize * 0.7;
            attempts++;
        } while (!isGoldMineSafe(x, z) && attempts < 200);
        if (attempts < 200) {
            goldMines.push(new GoldMine(x, z));
        }
    }
}

class HealthBar {
    constructor(x, y, z, maxHP) {
        this.x = x;
        this.y = y;
        this.z = z;
        this.maxHP = maxHP;
        this.currentHP = maxHP;

        const canvas = document.createElement('canvas');
        canvas.width = 128;
        canvas.height = 32;
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');

        const texture = new THREE.CanvasTexture(canvas);
        const material = new THREE.MeshBasicMaterial({ map: texture, transparent: true });
        const geometry = new THREE.PlaneGeometry(2, 0.4);
        this.mesh = new THREE.Mesh(geometry, material);
        this.mesh.position.set(x, y, z);
        scene.add(this.mesh);

        this.redraw();
    }

    setHP(currentHP) {
        this.currentHP = currentHP;
        this.redraw();
    }

    redraw() {
        this.ctx.fillStyle = '#000000';
        this.ctx.fillRect(0, 0, 128, 32);

        const hpPercent = Math.max(0, this.currentHP / this.maxHP);
        const color = hpPercent > 0.5 ? '#00FF00' : hpPercent > 0.25 ? '#FFFF00' : '#FF0000';

        this.ctx.fillStyle = color;
        this.ctx.fillRect(2, 2, (124 * hpPercent), 28);

        this.ctx.strokeStyle = '#FFFFFF';
        this.ctx.lineWidth = 2;
        this.ctx.strokeRect(2, 2, 124, 28);

        this.canvas.dispatchEvent(new Event('change'));
        const texture = new THREE.CanvasTexture(this.canvas);
        this.mesh.material.map = texture;
    }

    setPosition(x, y, z) {
        this.mesh.position.set(x, y, z);
        // Billboard: face camera
        if (camera) {
            this.mesh.quaternion.copy(camera.quaternion);
        }
    }

    remove() {
        if (this.mesh && this.mesh.parent) {
            scene.remove(this.mesh);
        }
    }
}

class Hero {
    constructor(playerId, x, z, color) {
        this.playerId = playerId;
        this.x = x;
        this.z = z;
        this.angle = Math.random() * Math.PI * 2;
        this.moveTimer = 0;
        this.hp = CONFIG.playerHP;
        this.maxHP = CONFIG.playerHP;
        this.trail = []; // cells walked outside own territory
        this.trailOriginal = new Map(); // gridIndex -> original cell value (to restore on erase)
        this.isOutside = false; // true when walking outside own territory
        this.wasOnTerritory = true; // must start trail from own territory
        this.lastGX = -1;
        this.lastGZ = -1;
        this.lastDamagedByPlayerId = 0; // track killer for territory conversion

        // GLTF animated character model
        this._heroModelKey = playerId % 2 === 1 ? 'hero_male' : 'hero_female';
        this._color = color;
        this._animMixer = null;
        this._animActions = null;
        this._currentAnim = '';
        this.mesh = new THREE.Group();
        this._buildHeroModel(this._heroModelKey, color);
        this.mesh.position.set(x, 0, z);
        scene.add(this.mesh);

        // Trail visual line
        this.trailLine = null;
        this.trailPositions = [];

        this.healthBar = new HealthBar(x, 8.0, z, this.maxHP);
        this._hitFlashTimer = 0;
    }

    _buildHeroModel(modelKey, color) {
        // Remove old model children
        while (this.mesh.children.length) this.mesh.remove(this.mesh.children[0]);
        this._animMixer = null;
        this._animActions = null;
        this._currentAnim = '';

        const gltfModel = cloneGLTF(modelKey);
        if (gltfModel) {
            this.mesh.add(gltfModel);
            fitToHeight(gltfModel, 6.4, modelKey); // pose-aware sizing (4x hero)
            this._gltfInner = gltfModel;
            // Tint to player color
            const playerColor = new THREE.Color(color);
            gltfModel.traverse(ch => {
                if (ch.isMesh) {
                    ch.material.color.lerp(playerColor, 0.2);
                    ch.material.emissive = playerColor.clone();
                    ch.material.emissiveIntensity = 0.06;
                    ch.castShadow = true;
                    ch.receiveShadow = true;
                }
            });
            // Setup animations
            const anim = createAnimMixer(gltfModel, modelKey);
            if (anim) {
                this._animMixer = anim.mixer;
                this._animActions = anim.actions;
                this.playAnim('Idle');
            }
        } else {
            const geometry = new THREE.CylinderGeometry(0.4, 0.5, 1.6, 16);
            const material = new THREE.MeshLambertMaterial({ color });
            this.mesh.add(new THREE.Mesh(geometry, material));
        }
    }

    playAnim(name) {
        if (!this._animActions || this._currentAnim === name) return;
        if (!this._animActions[name]) return;
        // Crossfade from current to new
        if (this._currentAnim && this._animActions[this._currentAnim]) {
            this._animActions[this._currentAnim].fadeOut(0.2);
        }
        const action = this._animActions[name];
        action.reset().fadeIn(0.2).play();
        this._currentAnim = name;
    }

    // Upgrade hero model when a new skill is acquired
    upgradeModel(skillKey) {
        if (GLTF_CACHE[skillKey]) {
            this._heroModelKey = skillKey;
            this._buildHeroModel(skillKey, this._color);
        }
    }

    takeDamage(damage) {
        // Attack path siege armor: 50% damage reduction when near enemy base
        let effectiveDmg = damage;
        const ss = playerSkillStates[this.playerId];
        if (ss && ss.skills.includes('attack_t1')) {
            for (const p of players) {
                if (p.id === this.playerId || !p.base || p.base.hp <= 0) continue;
                const dx = this.x - p.base.x, dz = this.z - p.base.z;
                if (dx*dx + dz*dz < 20 * 20) { // within 20 units of enemy base
                    effectiveDmg *= 0.5;
                    break;
                }
            }
        }
        // Attack T3 Shield: absorb damage with shield first
        if (ss && ss.skills.includes('attack_t3') && ss.shieldHP > 0) {
            const absorbed = Math.min(ss.shieldHP, effectiveDmg);
            ss.shieldHP -= absorbed;
            effectiveDmg -= absorbed;
            // Shield hit VFX + sound
            if (absorbed > 0) {
                spawnParticles(this.x, 2.5, this.z, 0x44AAFF, 3);
                if (this.playerId === 1) AudioMgr.shieldHit();
            }
        }
        this.hp = Math.max(0, this.hp - effectiveDmg);
        this.healthBar.setHP(this.hp);
        if (effectiveDmg > 0) {
            this._hitFlashTimer = 0.12;
            if (this.playerId === 1) AudioMgr.heroHit();
        }
        if (this.hp <= 0 && this.playerId === 1) AudioMgr.heroDeath();
        return this.hp <= 0;
    }

    updateTrailVisual() {
        if (this.trailLine) {
            scene.remove(this.trailLine);
            this.trailLine.geometry.dispose();
            this.trailLine = null;
        }
        if (this.trailPositions.length > 1) {
            const points = this.trailPositions.map(p => new THREE.Vector3(p[0], 1.5, p[1]));
            const geo = new THREE.BufferGeometry().setFromPoints(points);
            // Flash red when trail exceeds 2/3 of max
            const warningThreshold = CONFIG.maxTrailLength * 0.66;
            const isWarning = this.trail.length >= warningThreshold;
            let lineColor;
            if (isWarning) {
                // Flash between red and player color
                lineColor = (Math.floor(Date.now() / 200) % 2 === 0) ? 0xFF0000 : CONFIG.playerColors[this.playerId - 1];
            } else {
                lineColor = CONFIG.playerColors[this.playerId - 1];
            }
            const mat = new THREE.LineBasicMaterial({ color: lineColor, linewidth: 3, transparent: true, opacity: 0.8 });
            this.trailLine = new THREE.Line(geo, mat);
            scene.add(this.trailLine);
        }
    }

    update(dt, dirX = 0, dirZ = 0) {
        // Auto-move: always move forward in current direction
        if (dirX !== 0 || dirZ !== 0) {
            this.angle = Math.atan2(dirX, -dirZ);
        }

        // Terrain + territory speed modifiers; heal on own territory
        let speedMult = 1.0;
        const hCoords = territoryGrid.getGridCoords(this.x, this.z);
        const currentTerrain = getTerrainAt(this.x, this.z);
        const ss = playerSkillStates[this.playerId];
        // (Speed path removed)

        // River speed penalty (no speed path bonuses)
        if (currentTerrain === TERRAIN.RIVER) speedMult = 0.5;
        let onOwnTerritory = false;
        if (territoryGrid.isInBounds(hCoords.gx, hCoords.gz)) {
            const cellOwner = territoryGrid.getCell(hCoords.gx, hCoords.gz);
            onOwnTerritory = (cellOwner === this.playerId);
            // Heal on own territory (0.15 HP/sec)
            if (onOwnTerritory && this.hp < this.maxHP) {
                this.hp = Math.min(this.maxHP, this.hp + 0.15 * dt);
                this.healthBar.setHP(this.hp);
            }
        }
        // (Base slow zone removed — T0 has no slow zone)
        // Attack T3 shield: slow passive recharge
        if (ss && ss.skills.includes('attack_t3') && ss.shieldHP < ss.shieldMax) {
            ss.shieldHP = Math.min(ss.shieldMax, ss.shieldHP + ss.shieldRechargeRate * dt);
        }
        // Attack T3 kill buff: +30% move speed
        if (ss && ss.killBuffTimer > 0) speedMult *= 1.3;

        // (Speed T3 catapult removed)
        const moveX = Math.sin(this.angle) * CONFIG.heroSpeed * speedMult * dt;
        const moveZ = -Math.cos(this.angle) * CONFIG.heroSpeed * speedMult * dt;

        // Predictive forest collision: check destination, reject if forest (Speed T2 can walk through)
        const nextX = this.x + moveX;
        const nextZ = this.z + moveZ;
        const nextTerrain = getTerrainAt(nextX, nextZ);
        if (nextTerrain === TERRAIN.FOREST) {
            // Slide along forest edge: try X-only, then Z-only
            const txTerrain = getTerrainAt(this.x + moveX, this.z);
            const tzTerrain = getTerrainAt(this.x, this.z + moveZ);
            if (txTerrain !== TERRAIN.FOREST) {
                this.x += moveX;
            } else if (tzTerrain !== TERRAIN.FOREST) {
                this.z += moveZ;
            }
            // else: fully blocked, don't move
        } else {
            this.x += moveX;
            this.z += moveZ;
        }

        // Base collision: can't walk through enemy bases (own base is OK)
        const resolved = resolveBaseCollision(this.x, this.z, this.x - moveX, this.z - moveZ, this.playerId);
        this.x = resolved.x;
        this.z = resolved.z;

        // Gold mine collision: push hero out of gold mine cylinders
        const MINE_COLLISION_R = 4.5;
        for (const mine of goldMines) {
            const mdx = this.x - mine.x;
            const mdz = this.z - mine.z;
            const mDist = Math.sqrt(mdx * mdx + mdz * mdz);
            if (mDist < MINE_COLLISION_R && mDist > 0.01) {
                // Push hero to the edge of the mine
                this.x = mine.x + (mdx / mDist) * MINE_COLLISION_R;
                this.z = mine.z + (mdz / mDist) * MINE_COLLISION_R;
            }
        }

        const limit = CONFIG.mapSize / 2 - 2;
        this.x = Math.max(-limit, Math.min(limit, this.x));
        this.z = Math.max(-limit, Math.min(limit, this.z));

        // Animation state + mixer update
        const speed = Math.sqrt(moveX * moveX + moveZ * moveZ) / Math.max(dt, 0.001);
        if (speed > 0.5) {
            this.playAnim('Run');
        } else {
            this.playAnim('Idle');
        }
        if (this._animMixer) this._animMixer.update(dt);
        // Position and facing direction
        this.mesh.position.set(this.x, 0, this.z);
        this.mesh.rotation.set(0, Math.PI - this.angle, 0); // model faces +Z; negate angle to fix L/R
        this.healthBar.setPosition(this.x, 8.0, this.z);

        // Hit flash: briefly tint mesh red when damaged
        if (this._hitFlashTimer > 0) {
            this._hitFlashTimer -= dt;
            const flash = this._hitFlashTimer > 0;
            this.mesh.traverse(ch => {
                if (ch.isMesh && ch.material) {
                    if (flash) {
                        if (!ch._origEmissive) ch._origEmissive = ch.material.emissive.clone();
                        ch.material.emissive.set(0xff0000);
                        ch.material.emissiveIntensity = 0.8;
                    } else {
                        if (ch._origEmissive) { ch.material.emissive.copy(ch._origEmissive); ch._origEmissive = null; }
                        ch.material.emissiveIntensity = 0.06;
                    }
                }
            });
        }

        // Speed dust particles (ground dust when moving fast)
        this._dustTimer = (this._dustTimer || 0) + dt;
        if (speed > 3 && this._dustTimer > 0.15) {
            this._dustTimer = 0;
            const dustCount = Math.min(Math.floor(speed / 5), 3);
            spawnParticles(this.x - moveX * 2, 0.3, this.z - moveZ * 2, 0x886644, dustCount);
        }

        // (Speed VFX removed)

        // Attack T3 Shield VFX ring
        if (ss && ss.skills.includes('attack_t3')) {
            if (!this._shieldMesh) {
                const sGeo = new THREE.SphereGeometry(2.5, 16, 12, 0, Math.PI * 2, 0, Math.PI / 2); // dome (upper half)
                const sMat = new THREE.MeshBasicMaterial({ color: 0x44AAFF, transparent: true, opacity: 0.15, side: THREE.DoubleSide });
                this._shieldMesh = new THREE.Mesh(sGeo, sMat);
                scene.add(this._shieldMesh);
            }
            this._shieldMesh.position.set(this.x, 0, this.z);
            const shieldPct = ss.shieldHP / ss.shieldMax;
            this._shieldMesh.material.opacity = 0.08 + shieldPct * 0.15;
            this._shieldMesh.scale.setScalar(0.8 + shieldPct * 0.4);
            this._shieldMesh.visible = ss.shieldHP > 0.1;
        }

        // (Commander Aura VFX removed)

        // Territory enclosure system (paper.io style)
        const coords = territoryGrid.getGridCoords(this.x, this.z);
        if (territoryGrid.isInBounds(coords.gx, coords.gz)) {
            if (coords.gx !== this.lastGX || coords.gz !== this.lastGZ) {
                this.lastGX = coords.gx;
                this.lastGZ = coords.gz;

                const currentCell = territoryGrid.getCell(coords.gx, coords.gz);
                const trailVal = 10 + this.playerId;

                if (currentCell === this.playerId) {
                    // ON OWN TERRITORY
                    this.wasOnTerritory = true;
                    if (this.trail.length > 0) {
                        // Just returned from trail → CLAIM enclosure!
                        // STEP A: Temporarily write trailVal to ALL trail cells (including hidden enemy ones)
                        // so that claimTerritory's flood fill sees a complete barrier
                        for (const [gx, gz] of this.trail) {
                            const idx = gz * territoryGrid.gridSize + gx;
                            const cellVal = territoryGrid.grid[idx];
                            if (cellVal !== trailVal) {
                                if (!this.trailOriginal.has(idx)) this.trailOriginal.set(idx, cellVal);
                                territoryGrid.grid[idx] = trailVal;
                            }
                        }
                        const claimed = territoryGrid.claimTerritory(this.playerId, this.trail);
                        if (claimed === 0) {
                            // No area enclosed — restore ALL trail cells to original values
                            for (const [gx, gz] of this.trail) {
                                const idx = gz * territoryGrid.gridSize + gx;
                                if (this.trailOriginal.has(idx)) {
                                    territoryGrid.grid[idx] = this.trailOriginal.get(idx);
                                }
                            }
                            territoryGrid.redraw();
                        } else {
                            // Successful claim! Trail path + enclosed area all become playerId.
                            territoryGrid.redraw();
                            if (this.playerId === 1) AudioMgr.territoryClaim();
                            // XP from territory capture — enemy territory gives x2
                            let enemyClaimed = 0;
                            for (const [ogIdx, ogVal] of this.trailOriginal) {
                                if (ogVal >= 1 && ogVal <= 4 && ogVal !== this.playerId) enemyClaimed++;
                            }
                            const neutralClaimed = claimed - enemyClaimed;
                            playerGainXP(this.playerId, neutralClaimed * 0.2 + enemyClaimed * 0.4);
                            // (Greed gold theft removed)
                        }
                        this.trail = [];
                        this.trailOriginal.clear();
                        this.trailPositions = [];
                        this.isOutside = false;
                        this.updateTrailVisual();
                    }
                } else {
                    // OUTSIDE — only add trail if we LEFT from own territory
                    if (!this.wasOnTerritory && this.trail.length === 0) {
                        // Started outside without being on own territory first — can't trail
                    } else {
                        this.isOutside = true;
                        this.wasOnTerritory = false;
                        // Mark this cell as trail — save original value for restore on erase
                        // HIDDEN TRAIL: don't visually overwrite enemy territory cells on the grid
                        // Only write trailVal on empty cells (0); enemy cells tracked in trailOriginal only
                        if (territoryGrid.isInBounds(coords.gx, coords.gz)) {
                            const cellVal = territoryGrid.getCell(coords.gx, coords.gz);
                            const idx = coords.gz * territoryGrid.gridSize + coords.gx;
                            // Skip if already tracked as trail (hidden or visible)
                            if (cellVal !== this.playerId && cellVal !== trailVal && !this.trailOriginal.has(idx)) {
                                this.trailOriginal.set(idx, cellVal);
                                this.trail.push([coords.gx, coords.gz]);
                                // Only write trailVal on non-enemy cells (empty=0)
                                if (cellVal === 0) {
                                    territoryGrid.setCell(coords.gx, coords.gz, trailVal);
                                }
                            }
                        }
                        // Also mark immediate neighbors for wider trail
                        for (let ddx = -1; ddx <= 1; ddx++) {
                            for (let ddz = -1; ddz <= 1; ddz++) {
                                if (ddx === 0 && ddz === 0) continue;
                                const nx = coords.gx + ddx;
                                const nz = coords.gz + ddz;
                                if (territoryGrid.isInBounds(nx, nz)) {
                                    const cellVal = territoryGrid.getCell(nx, nz);
                                    const idx = nz * territoryGrid.gridSize + nx;
                                    // Skip if already tracked as trail (hidden or visible)
                                    if (cellVal !== this.playerId && cellVal !== trailVal && !this.trailOriginal.has(idx)) {
                                        this.trailOriginal.set(idx, cellVal);
                                        this.trail.push([nx, nz]);
                                        // Only write trailVal on non-enemy cells (empty=0)
                                        if (cellVal === 0) {
                                            territoryGrid.setCell(nx, nz, trailVal);
                                        }
                                    }
                                }
                            }
                        }
                        territoryGrid.redraw();
                        const worldX = (coords.gx - territoryGrid.gridSize / 2) * territoryGrid.cellSize;
                        const worldZ = (coords.gz - territoryGrid.gridSize / 2) * territoryGrid.cellSize;
                        this.trailPositions.push([worldX, worldZ]);
                        this.updateTrailVisual();

                        // Trail length limit: ERASE trail (punishment, must return to claim)
                        if (this.trail.length >= CONFIG.maxTrailLength) {
                            // Restore: both visible trailVal cells and hidden enemy territory trail cells
                            for (let i = 0; i < territoryGrid.grid.length; i++) {
                                if (territoryGrid.grid[i] === trailVal) {
                                    territoryGrid.grid[i] = this.trailOriginal.has(i) ? this.trailOriginal.get(i) : 0;
                                }
                            }
                            // Hidden trail cells (enemy territory that wasn't overwritten) are already correct
                            this.trailOriginal.clear();
                            territoryGrid.redraw();
                            this.trail = [];
                            this.trailPositions = [];
                            this.isOutside = false;
                            this.wasOnTerritory = false;
                            this.updateTrailVisual();
                        }
                    }
                }
            }
        }

        // Flash trail red warning continuously when over 2/3
        if (this.trailLine && this.trail.length >= CONFIG.maxTrailLength * 0.66) {
            const flashColor = (Math.floor(Date.now() / 200) % 2 === 0) ? 0xFF0000 : CONFIG.playerColors[this.playerId - 1];
            this.trailLine.material.color.setHex(flashColor);
        }

        // (HP regen handled above at 0.15 HP/sec — no duplicate needed)

        // (move sound removed — too noisy)
    }

    remove() {
        if (this.mesh && this.mesh.parent) {
            scene.remove(this.mesh);
        }
        if (this.trailLine) {
            scene.remove(this.trailLine);
        }
        if (this._shieldMesh && this._shieldMesh.parent) {
            scene.remove(this._shieldMesh);
            this._shieldMesh.geometry.dispose();
            this._shieldMesh.material.dispose();
            this._shieldMesh = null;
        }
        if (this._auraMesh && this._auraMesh.parent) {
            scene.remove(this._auraMesh);
            this._auraMesh.geometry.dispose();
            this._auraMesh.material.dispose();
            this._auraMesh = null;
        }
        if (this._auraFillMesh && this._auraFillMesh.parent) {
            scene.remove(this._auraFillMesh);
            this._auraFillMesh.geometry.dispose();
            this._auraFillMesh.material.dispose();
            this._auraFillMesh = null;
        }
        this.healthBar.remove();
    }
}

class Soldier {
    constructor(playerId, x, z, color) {
        this.playerId = playerId;
        this.x = x;
        this.z = z;
        this.hp = CONFIG.soldierHP;
        this.maxHP = CONFIG.soldierHP;
        this.damage = CONFIG.soldierDamage;
        this.speed = CONFIG.heroSpeed * 0.9;
        // (Commander aura removed)
        this.attackRange = 3;
        this.attackCooldown = 0;
        this.attackWindup = 0;
        this.isWindingUp = false;
        this.target = null;
        this.inCombat = false;
        this.angle = Math.random() * Math.PI * 2; // facing direction // true when engaging nearby enemy

        // Birth directive: NPC soldiers gang up on #1; #1's soldiers scatter randomly
        this._assignMarchTarget(playerId);
    }

    _assignMarchTarget(playerId) {
        this.marchTarget = null;
        const enemies = players.filter(p => p.id !== playerId && p.base && p.base.hp > 0);
        if (enemies.length === 0) return;

        // 50% of soldiers prioritize attacking #1 player's base
        if (territoryLeaderId > 0 && territoryLeaderId !== playerId && Math.random() < 0.5) {
            const leader = players.find(p => p.id === territoryLeaderId);
            if (leader && leader.base && leader.base.hp > 0) {
                this.marchTarget = { x: leader.base.x, z: leader.base.z };
                return;
            }
        }
        // Otherwise: random enemy
        const e = enemies[Math.floor(Math.random() * enemies.length)];
        this.marchTarget = { x: e.base.x, z: e.base.z };
    }

    takeDamage(damage) {
        const effectiveDmg = damage;
        this.hp = Math.max(0, this.hp - effectiveDmg);
        if (effectiveDmg > 0) { // red hit: small upward burst
            for (let i = 0; i < 2; i++) {
                particles.push(new Particle(this.x, 1.5, this.z,
                    (Math.random()-0.5)*2, 12+Math.random()*6, (Math.random()-0.5)*2,
                    0xff0000, 0.4));
            }
        }
        return this.hp <= 0;
    }

    findTarget() {
        // Priority: 1) enemy soldiers (always engage), 2) heroes (50% chance), 3) bases (close range)
        const engageRange = 18;
        // First: find closest enemy soldier
        let closestSoldier = null, closestSoldierDist = engageRange;
        for (const s of soldiers) {
            if (s.playerId === this.playerId || s.hp <= 0) continue;
            const dx = s.x - this.x, dz = s.z - this.z;
            const d = Math.sqrt(dx*dx + dz*dz);
            if (d < closestSoldierDist) { closestSoldierDist = d; closestSoldier = { x: s.x, z: s.z, entity: s, dist: d }; }
        }
        // If enemy soldier nearby, always fight them
        if (closestSoldier) {
            this.inCombat = true;
            this.target = closestSoldier;
            return;
        }
        // Second: heroes — 50% chance to engage
        let closestHero = null, closestHeroDist = engageRange;
        for (const p of players) {
            if (p.id === this.playerId || !p.hero) continue;
            const dx = p.hero.x - this.x, dz = p.hero.z - this.z;
            const d = Math.sqrt(dx*dx + dz*dz);
            if (d < closestHeroDist) { closestHeroDist = d; closestHero = { x: p.hero.x, z: p.hero.z, entity: p.hero, dist: d }; }
        }
        if (closestHero && Math.random() < 0.5) {
            this.inCombat = true;
            this.target = closestHero;
            return;
        }
        // Third: bases — only when close
        let closestBase = null, closestBaseDist = 12;
        for (const p of players) {
            if (p.id === this.playerId || !p.base || p.base.hp <= 0) continue;
            const dx = p.base.x - this.x, dz = p.base.z - this.z;
            const d = Math.sqrt(dx*dx + dz*dz);
            if (d < closestBaseDist) { closestBaseDist = d; closestBase = { x: p.base.x, z: p.base.z, entity: p.base, dist: d }; }
        }
        if (closestBase) {
            this.inCombat = true;
            this.target = closestBase;
            return;
        }
        this.inCombat = false;
        this.target = null;
    }

    update(dt) {
        if (this.hp <= 0) return false;

        this.attackCooldown = Math.max(0, this.attackCooldown - dt);

        // Terrain + territory speed modifier
        const coords = territoryGrid.getGridCoords(this.x, this.z);
        const cellOwner = territoryGrid.getCell(coords.gx, coords.gz);
        const soldierTerrain = getTerrainAt(this.x, this.z);
        let speedMult = 1.0;
        if (soldierTerrain === TERRAIN.RIVER) speedMult = 0.5;
        if (cellOwner === this.playerId) speedMult *= 1.2; // +20% on own territory
        else if (cellOwner >= 1 && cellOwner <= 4) speedMult *= 0.85; // -15% on enemy territory
        // (Base slow zone removed — T0 has no slow zone)

        // (Commander Aura buff removed)

        // (Commander T2 formation following removed)

        // Scan for enemies frequently: every frame if no target, 20% chance if has target (to update)
        if (!this.target || !this.inCombat || Math.random() < 0.2) this.findTarget();

        // Chase leash: only chase a short distance from march path (20 units), then refocus on mission
        if (this.inCombat && this.marchTarget) {
            const lx = this.marchTarget.x - this.x, lz = this.marchTarget.z - this.z;
            const leashDist = Math.sqrt(lx * lx + lz * lz);
            if (leashDist > 20) {
                this.target = null;
                this.inCombat = false;
            }
        }

        // Also abandon chase if target moved out of engage range (enemy ran away)
        if (this.inCombat && this.target && this.target.entity) {
            const e = this.target.entity;
            if (e.hp !== undefined && e.hp <= 0) {
                this.target = null;
                this.inCombat = false;
            } else {
                const dx = (e.x || this.target.x) - this.x;
                const dz = (e.z || this.target.z) - this.z;
                const d = Math.sqrt(dx*dx + dz*dz);
                if (d > 22) { // slightly larger than engage range to avoid flicker
                    this.target = null;
                    this.inCombat = false;
                } else {
                    // Update target position (enemies move)
                    this.target.x = e.x || this.target.x;
                    this.target.z = e.z || this.target.z;
                }
            }
        }

        // If no combat target, march toward birth directive (with forest avoidance + stuck detection)
        if (!this.inCombat && this.marchTarget) {
            const prevSX = this.x, prevSZ = this.z;
            let dx = this.marchTarget.x - this.x;
            let dz = this.marchTarget.z - this.z;
            const dist = Math.sqrt(dx*dx + dz*dz);
            if (dist > 2) {
                let ndx = (dx / dist), ndz = (dz / dist);
                this.angle = Math.atan2(dx, -dz); // update facing toward march target
                const step = this.speed * speedMult * dt;
                const nextX = this.x + ndx * step;
                const nextZ = this.z + ndz * step;
                if (getTerrainAt(nextX, nextZ) === TERRAIN.FOREST) {
                    // Try multiple angles to find a way around forest
                    let moved = false;
                    // Try perpendicular left/right first
                    const leftX = this.x + ndz * step, leftZ = this.z - ndx * step;
                    const rightX = this.x - ndz * step, rightZ = this.z + ndx * step;
                    if (getTerrainAt(leftX, leftZ) !== TERRAIN.FOREST) {
                        this.x = leftX; this.z = leftZ; moved = true;
                    } else if (getTerrainAt(rightX, rightZ) !== TERRAIN.FOREST) {
                        this.x = rightX; this.z = rightZ; moved = true;
                    } else {
                        // Try 8 angles (45° increments) to find ANY escape
                        for (let angle = 0; angle < 8 && !moved; angle++) {
                            const a = (angle / 8) * Math.PI * 2;
                            const tryX = this.x + Math.cos(a) * step;
                            const tryZ = this.z + Math.sin(a) * step;
                            if (getTerrainAt(tryX, tryZ) !== TERRAIN.FOREST) {
                                this.x = tryX; this.z = tryZ; moved = true;
                            }
                        }
                    }
                    if (!moved) {
                        this.stuckCount = (this.stuckCount || 0) + 1;
                        if (this.stuckCount > 15) {
                            // Teleport to nearest non-forest cell (emergency unstick)
                            for (let r = 2; r <= 10; r += 2) {
                                for (let a = 0; a < 8; a++) {
                                    const tryX = this.x + Math.cos(a / 8 * Math.PI * 2) * r;
                                    const tryZ = this.z + Math.sin(a / 8 * Math.PI * 2) * r;
                                    if (getTerrainAt(tryX, tryZ) !== TERRAIN.FOREST) {
                                        this.x = tryX; this.z = tryZ;
                                        this.stuckCount = 0;
                                        moved = true; break;
                                    }
                                }
                                if (moved) break;
                            }
                            this.stuckCount = 0;
                        }
                    } else {
                        this.stuckCount = 0;
                    }
                } else {
                    this.x = nextX;
                    this.z = nextZ;
                    this.stuckCount = 0;
                }
                const limit = CONFIG.mapSize / 2 - 2;
                this.x = Math.max(-limit, Math.min(limit, this.x));
                this.z = Math.max(-limit, Math.min(limit, this.z));
            }
            // Base collision for soldiers
            const sr = resolveBaseCollision(this.x, this.z, prevSX, prevSZ, this.playerId);
            this.x = sr.x; this.z = sr.z;
            return true;
        }

        // Windup: stop for 0.5s before dealing damage
        if (this.isWindingUp) {
            this.attackWindup -= dt;
            if (this.attackWindup <= 0) {
                this.isWindingUp = false;
                // Deal damage NOW
                if (this.target && this.target.entity) {
                    const effectiveDmg = this.damage;
                    if (typeof this.target.entity.takeDamage === 'function') {
                        this.target.entity.takeDamage(effectiveDmg);
                    } else if (this.target.entity.hp !== undefined) {
                        this.target.entity.hp -= effectiveDmg;
                    }
                    if (this.target.entity.hp !== undefined && this.target.entity.hp <= 0) {
                        this.target = null;
                    }
                }
                this.attackCooldown = CONFIG.soldierAttackCooldown;
            }
            // Don't move during windup
        } else if (this.target) {
            let dx = this.target.x - this.x;
            let dz = this.target.z - this.z;
            const dist = Math.sqrt(dx*dx + dz*dz);

            // Use larger attack range for base targets (soldiers stop at base collision edge)
            const effectiveRange = (this.target.entity instanceof Base) ? BASE_COLLISION_RADIUS + 1.0 : this.attackRange;
            if (dist > effectiveRange) {
                const prevCX = this.x, prevCZ = this.z;
                this.angle = Math.atan2(dx, -dz); // face combat target
                // Spread: add slight perpendicular offset so soldiers don't stack on same point
                if (!this._combatSpread) this._combatSpread = (Math.random() - 0.5) * 2; // -1 to 1
                const spreadStr = 0.3 * this._combatSpread; // gentle sideways drift
                const rawNdx = dx / dist, rawNdz = dz / dist;
                const ndx = rawNdx + (-rawNdz) * spreadStr;
                const ndz = rawNdz + rawNdx * spreadStr;
                const step = this.speed * speedMult * dt;
                const nx = this.x + ndx * step, nz = this.z + ndz * step;
                if (getTerrainAt(nx, nz) === TERRAIN.FOREST) {
                    // Try perpendicular first, then 8 angles
                    let cmoved = false;
                    const lx = this.x + ndz * step, lz = this.z - ndx * step;
                    const rx = this.x - ndz * step, rz = this.z + ndx * step;
                    if (getTerrainAt(lx, lz) !== TERRAIN.FOREST) { this.x = lx; this.z = lz; cmoved = true; }
                    else if (getTerrainAt(rx, rz) !== TERRAIN.FOREST) { this.x = rx; this.z = rz; cmoved = true; }
                    else {
                        for (let ai = 0; ai < 8 && !cmoved; ai++) {
                            const a = (ai / 8) * Math.PI * 2;
                            const tx = this.x + Math.cos(a) * step, tz = this.z + Math.sin(a) * step;
                            if (getTerrainAt(tx, tz) !== TERRAIN.FOREST) { this.x = tx; this.z = tz; cmoved = true; }
                        }
                    }
                } else { this.x = nx; this.z = nz; }
                const limit = CONFIG.mapSize / 2 - 2;
                this.x = Math.max(-limit, Math.min(limit, this.x));
                this.z = Math.max(-limit, Math.min(limit, this.z));
                // Base collision during combat chase — keep collision active for ALL bases
                // Soldiers will stop at the collision edge and attack from there
                const cr = resolveBaseCollision(this.x, this.z, prevCX, prevCZ, this.playerId);
                this.x = cr.x; this.z = cr.z;
            } else if (this.attackCooldown <= 0) {
                // Start windup (stop moving, wait 0.8s, then deal damage — heroes can dodge by running)
                this.isWindingUp = true;
                this.attackWindup = 0.8;
            }
        }

        return true;
    }

    reset(playerId, x, z, color) {
        this.playerId = playerId;
        this.x = x;
        this.z = z;
        this.hp = CONFIG.soldierHP;
        this.maxHP = CONFIG.soldierHP;
        this.damage = CONFIG.soldierDamage;
        // (auraBuffTimer removed)
        this.attackCooldown = 0;
        this.attackWindup = 0;
        this.isWindingUp = false;
        this.target = null;
        this.inCombat = false;
        this._assignMarchTarget(playerId);
    }

    deactivate() {
        this.hp = 0;
    }

    remove() {
        // No-op: rendering handled by InstancedMesh
    }
}

// Soldier Object Pool + InstancedMesh rendering system
const soldiers = [];
const soldierPool = {
    inactive: [],
    spawn(playerId, x, z, color) {
        let s;
        if (this.inactive.length > 0) {
            s = this.inactive.pop();
            s.reset(playerId, x, z, color);
        } else {
            s = new Soldier(playerId, x, z, color);
        }
        soldiers.push(s);
        return s;
    },
    recycle(soldier) {
        soldier.deactivate();
        this.inactive.push(soldier);
    },
    clearAll() {
        for (const s of soldiers) s.deactivate();
        this.inactive.push(...soldiers);
        soldiers.length = 0;
    }
};

// InstancedMesh system: per-player monster type (Pack 004 Cute Monsters)
const SOLDIER_MAX_INSTANCES = 100; // max per player
const soldierInstancedMeshes = {}; // keyed by playerId
const _soldierDummy = new THREE.Object3D();
const _soldierGeoCache = {}; // keyed by soldier model key

// Bake a SkinnedMesh GLTF into static geometry at Idle pose
function bakeSoldierGeo(modelKey, targetH) {
    if (_soldierGeoCache[modelKey]) return _soldierGeoCache[modelKey];
    const cached = GLTF_CACHE[modelKey];
    if (!cached) return null;
    const model = cached.hasSkinnedMesh ? SkeletonUtils.clone(cached.scene) : cached.scene.clone();
    // Apply Idle animation for natural pose
    if (cached.animations.length > 0) {
        const mixer = new THREE.AnimationMixer(model);
        const clip = cached.animations.find(c => c.name === 'Idle') || cached.animations[0];
        if (clip) { mixer.clipAction(clip).play(); mixer.update(0.1); }
        model.updateMatrixWorld(true);
        mixer.stopAllAction();
    }
    const geometries = [];
    model.traverse(ch => {
        if (ch.isSkinnedMesh && ch.geometry) {
            const posAttr = ch.geometry.attributes.position;
            const baked = new Float32Array(posAttr.count * 3);
            const v = new THREE.Vector3();
            for (let i = 0; i < posAttr.count; i++) {
                v.fromBufferAttribute(posAttr, i);
                ch.boneTransform(i, v);
                baked[i * 3] = v.x; baked[i * 3 + 1] = v.y; baked[i * 3 + 2] = v.z;
            }
            const ng = new THREE.BufferGeometry();
            ng.setAttribute('position', new THREE.BufferAttribute(baked, 3));
            if (ch.geometry.index) ng.setIndex(ch.geometry.index.clone());
            ng.computeVertexNormals();
            geometries.push(ng);
        } else if (ch.isMesh && ch.geometry) {
            const ng = ch.geometry.clone();
            geometries.push(ng);
        }
    });
    if (geometries.length === 0) return null;
    const merged = geometries.length === 1 ? geometries[0]
        : BufferGeometryUtils.mergeGeometries(geometries, false);
    if (!merged) return null;
    // Scale to targetH
    const tmpM = new THREE.Mesh(merged);
    const box = new THREE.Box3().setFromObject(tmpM);
    const sz = new THREE.Vector3(); box.getSize(sz);
    const sc = targetH / Math.max(sz.y, 0.01);
    merged.scale(sc, sc, sc);
    merged.computeBoundingBox();
    const ctr = new THREE.Vector3();
    merged.boundingBox.getCenter(ctr);
    merged.translate(-ctr.x, -ctr.y + targetH / 2, -ctr.z);
    _soldierGeoCache[modelKey] = merged;
    return merged;
}

function getOrCreateSoldierInstancedMesh(playerId, color) {
    if (soldierInstancedMeshes[playerId]) return soldierInstancedMeshes[playerId];
    // Each player gets a different monster model
    const modelKey = `soldier_p${playerId}`;
    const geo = bakeSoldierGeo(modelKey, 1.25) || new THREE.SphereGeometry(0.5, 8, 6);
    const mat = new THREE.MeshLambertMaterial({ color });
    const mesh = new THREE.InstancedMesh(geo, mat, SOLDIER_MAX_INSTANCES);
    mesh.count = 0;
    mesh.castShadow = true;
    mesh.frustumCulled = false;
    scene.add(mesh);
    soldierInstancedMeshes[playerId] = mesh;
    return mesh;
}

// Per-soldier random bob seed (assigned on spawn for variation)
let _soldierBobSeeds = new Float32Array(400); // pre-fill with random values
for (let i = 0; i < 400; i++) _soldierBobSeeds[i] = Math.random() * Math.PI * 2;

function updateSoldierInstances() {
    // Reset counts
    for (const pid in soldierInstancedMeshes) {
        soldierInstancedMeshes[pid].count = 0;
    }
    const t = performance.now() * 0.005;
    const counts = {};
    let globalIdx = 0;
    for (const s of soldiers) {
        if (s.hp <= 0) { globalIdx++; continue; }
        const pid = s.playerId;
        if (!counts[pid]) counts[pid] = 0;
        const iMesh = soldierInstancedMeshes[pid];
        if (!iMesh || counts[pid] >= SOLDIER_MAX_INSTANCES) { globalIdx++; continue; }
        const idx = counts[pid];
        // Randomized bob: each soldier has unique phase, speed, and amplitude
        const seed = _soldierBobSeeds[globalIdx % 400];
        const bobSpeed = 2.25 + seed * 1.0; // 2.25~3.25 frequency (half speed)
        const bobAmp = 0.024 + (seed * 0.03); // 0.024~0.054 amplitude
        const bobY = Math.sin(t * bobSpeed + seed * 10) * bobAmp;
        // Slight tilt for liveliness
        const tiltX = Math.sin(t * bobSpeed * 0.7 + seed * 5) * 0.008;
        _soldierDummy.position.set(s.x, bobY, s.z);
        _soldierDummy.rotation.set(tiltX, Math.PI - (s.angle || 0), 0);
        _soldierDummy.updateMatrix();
        iMesh.setMatrixAt(idx, _soldierDummy.matrix);
        counts[pid]++;
        globalIdx++;
    }
    // Update counts and flag for GPU upload
    for (const pid in soldierInstancedMeshes) {
        const iMesh = soldierInstancedMeshes[pid];
        iMesh.count = counts[pid] || 0;
        iMesh.instanceMatrix.needsUpdate = true;
    }
}

function clearSoldierInstances() {
    for (const pid in soldierInstancedMeshes) {
        scene.remove(soldierInstancedMeshes[pid]);
        soldierInstancedMeshes[pid].dispose();
        delete soldierInstancedMeshes[pid];
    }
    // Also clear buff icons
    if (_buffIconMesh) {
        scene.remove(_buffIconMesh);
        _buffIconMesh.dispose();
        _buffIconMesh = null;
    }
}

// Aura buff icon: small gold diamond floating above buffed soldiers
let _buffIconMesh = null;
const _buffIconDummy = new THREE.Object3D();
const BUFF_ICON_MAX = 120;

function getOrCreateBuffIconMesh() {
    if (_buffIconMesh) return _buffIconMesh;
    const geo = new THREE.OctahedronGeometry(0.25, 0);
    const mat = new THREE.MeshBasicMaterial({ color: 0xFFCC00, transparent: true, opacity: 0.9 });
    _buffIconMesh = new THREE.InstancedMesh(geo, mat, BUFF_ICON_MAX);
    _buffIconMesh.count = 0;
    _buffIconMesh.frustumCulled = false;
    scene.add(_buffIconMesh);
    return _buffIconMesh;
}

function updateBuffIcons() {
    const mesh = getOrCreateBuffIconMesh();
    let count = 0;
    const bobY = Math.sin(Date.now() * 0.004) * 0.15; // gentle bob
    for (const s of soldiers) {
        if (s.hp <= 0 || !s._auraBuffActive || count >= BUFF_ICON_MAX) continue;
        _buffIconDummy.position.set(s.x, 2.2 + bobY, s.z);
        _buffIconDummy.rotation.y = Date.now() * 0.003; // slow spin
        _buffIconDummy.updateMatrix();
        mesh.setMatrixAt(count, _buffIconDummy.matrix);
        count++;
    }
    mesh.count = count;
    mesh.instanceMatrix.needsUpdate = true;
}

class Base {
    constructor(x, z, color, baseId) {
        this.x = x;
        this.z = z;
        this.baseId = baseId;
        this.color = color;
        this.hp = CONFIG.baseHP;
        this.maxHP = CONFIG.baseHP;
        this.spawnTimer = 0;
        this.spawnInterval = 5;
        this.arrowCooldown = 0;
        this.bombCooldown = 0;
        this.tier = 0; // current base tier (0-4)

        // Wall system
        this.walls = []; // {mesh, hp, maxHP, angle, rebuildTimer}
        this.slowZoneMesh = null;

        // Build initial model (T0)
        this.group = new THREE.Group();
        this._buildModel(color);
        this.group.position.set(x, 0, z);
        scene.add(this.group);
        this.healthBar = new HealthBar(x, 16, z, this.maxHP);
    }

    _buildModel(color) {
        // Clear previous meshes (except walls)
        while (this.group.children.length > 0) {
            const c = this.group.children[0];
            this.group.remove(c);
            if (c.geometry) c.geometry.dispose();
            if (c.material) c.material.dispose();
        }
        const t = this.tier;
        const towerR = 4 + t * 0.5;
        const towerH = (6 + t * 1.2) * 1.5; // x1.5 per user request

        // GLTF Temple model (tier-based)
        const modelKey = `base_t${Math.min(t, 3)}`;
        const gltfModel = cloneGLTF(modelKey);
        if (gltfModel) {
            fitToHeight(gltfModel, towerH);
            const playerColor = new THREE.Color(color);
            gltfModel.traverse(ch => {
                if (ch.isMesh) {
                    ch.material.color.lerp(playerColor, 0.175);
                    ch.material.emissive = playerColor.clone();
                    ch.material.emissiveIntensity = 0.1;
                    ch.castShadow = true;
                    ch.receiveShadow = true;
                }
            });
            this.group.add(gltfModel);
        } else {
            // Fallback: cylinder tower
            const tower = new THREE.Mesh(
                new THREE.CylinderGeometry(towerR - 0.3, towerR, towerH, 8),
                new THREE.MeshLambertMaterial({ color })
            );
            tower.position.y = towerH / 2;
            tower.castShadow = true;
            this.group.add(tower);
        }

        // (T2+ spike zone, T3+ cannon, T4 walls/flag removed — always T0)
    }

    setTier(newTier) {
        // (Base upgrade removed — always T0)
    }

    _spawnWalls() {
        const tier = BASE_TIERS[this.tier];
        const count = tier.wallSegments;
        const radius = tier.wallRadius;
        const wallH = 3;
        const wallThick = 0.2;
        const chordLen = 2 * radius * Math.sin(Math.PI / count) * 0.9;
        for (let i = 0; i < count; i++) {
                const angle = (i / count) * Math.PI * 2;
                const wx = this.x + Math.cos(angle) * radius;
                const wz = this.z + Math.sin(angle) * radius;
                const wallGeo = new THREE.BoxGeometry(chordLen, wallH, wallThick);
                const wallMat = new THREE.MeshLambertMaterial({ color: 0x999999 });
                const wallMesh = new THREE.Mesh(wallGeo, wallMat);
                wallMesh.position.set(wx, wallH / 2, wz);
                wallMesh.rotation.y = Math.PI / 2 - angle;
                wallMesh.castShadow = true;
                scene.add(wallMesh);
                this.walls.push({
                    mesh: wallMesh, hp: tier.wallHP, maxHP: tier.wallHP,
                    angle, x: wx, z: wz, destroyed: false, rebuildTimer: 0,
                });
        }
    }

    takeDamage(damage) {
        // If walls exist, damage hits nearest wall first
        if (this.walls.length > 0) {
            const aliveWalls = this.walls.filter(w => !w.destroyed);
            if (aliveWalls.length > 0) {
                // Pick a random alive wall to absorb damage
                const wall = aliveWalls[Math.floor(Math.random() * aliveWalls.length)];
                wall.hp -= damage;
                if (wall.hp <= 0) {
                    wall.destroyed = true;
                    wall.rebuildTimer = BASE_TIERS[this.tier].wallRebuildTime;
                    wall.mesh.visible = false;
                    spawnParticles(wall.x, 2, wall.z, 0x888888, 8);
                    { const hp = humanPlayer?.hero; if (hp) { const _d2 = (hp.x-this.x)**2+(hp.z-this.z)**2; if (_d2 < 1600) AudioMgr.wallBreak(); } }
                }
                return false; // base not dead, wall absorbed
            }
        }
        this.hp = Math.max(0, this.hp - damage);
        this.healthBar.setHP(this.hp);
        { const hp = humanPlayer?.hero; const _near = hp ? ((hp.x-this.x)**2+(hp.z-this.z)**2 < 1600) : true;
          if (damage > 0 && _near) AudioMgr.baseDamage();
          if (this.hp <= 0) AudioMgr.baseDestroy(); }
        return this.hp <= 0;
    }

    _findNearestEnemies(maxRange, maxTargets) {
        const candidates = [];
        for (const s of soldiers) {
            if (s.playerId === this.baseId || s.hp <= 0) continue;
            const dx = s.x - this.x, dz = s.z - this.z;
            const d2 = dx*dx + dz*dz;
            if (d2 < maxRange * maxRange) candidates.push({ target: s, dist: d2 });
        }
        for (const p of players) {
            if (p.id === this.baseId || !p.hero) continue;
            const dx = p.hero.x - this.x, dz = p.hero.z - this.z;
            const d2 = dx*dx + dz*dz;
            if (d2 < maxRange * maxRange) candidates.push({ target: p.hero, dist: d2 });
        }
        candidates.sort((a, b) => a.dist - b.dist);
        return candidates.slice(0, maxTargets).map(c => c.target);
    }

    _findBombTarget(range) {
        // Find cluster of enemies: pick the position with most enemies within bombRadius
        const tier = BASE_TIERS[this.tier];
        let bestTarget = null, bestCount = 0;
        const candidates = [];
        for (const s of soldiers) {
            if (s.playerId === this.baseId || s.hp <= 0) continue;
            const dx = s.x - this.x, dz = s.z - this.z;
            if (dx*dx + dz*dz < range * range) candidates.push(s);
        }
        for (const p of players) {
            if (p.id === this.baseId || !p.hero) continue;
            const dx = p.hero.x - this.x, dz = p.hero.z - this.z;
            if (dx*dx + dz*dz < range * range) candidates.push(p.hero);
        }
        for (const c of candidates) {
            let count = 0;
            for (const c2 of candidates) {
                const dx = c2.x - c.x, dz = c2.z - c.z;
                if (dx*dx + dz*dz < tier.bombRadius * tier.bombRadius) count++;
            }
            if (count > bestCount) { bestCount = count; bestTarget = c; }
        }
        return bestTarget;
    }

    update(dt) {
        const baseBarY = 6 * 1.5 + 3; // towerH + 3 offset (fixed T0)
        this.healthBar.setPosition(this.x, baseBarY, this.z);
        const tier = BASE_TIERS[this.tier];

        // Spawn soldiers (fixed interval, no commander bonus)
        const effectiveSpawnInterval = this.spawnInterval;
        this.spawnTimer += dt;
        if (this.spawnTimer >= effectiveSpawnInterval && this.hp > 0) {
            this.spawnTimer = 0;
            const player = players.find(p => p.id === this.baseId);
            const currentCount = soldiers.filter(s => s.playerId === this.baseId && s.hp > 0).length;
            let batchSize = 1;
            if (player && player.isHuman) {
                batchSize = upgradeState.soldierBatch;
            } else if (player && npcUpgradeState[player.id]) {
                batchSize = npcUpgradeState[player.id].soldierBatch;
            }
            if (player && currentCount < CONFIG.maxSoldiersPerBase) {
                const toSpawn = Math.min(batchSize, CONFIG.maxSoldiersPerBase - currentCount);
                for (let si = 0; si < toSpawn; si++) {
                    const angle = Math.random() * Math.PI * 2;
                    const sx = this.x + Math.cos(angle) * 8;
                    const sz = this.z + Math.sin(angle) * 8;
                    soldierPool.spawn(this.baseId, sx, sz, player.color);
                }
            }
        }

        if (this.hp <= 0) return;

        // Arrow defense — multi-target
        this.arrowCooldown = Math.max(0, this.arrowCooldown - dt);
        if (this.arrowCooldown <= 0) {
            const targets = this._findNearestEnemies(tier.arrowRange, tier.arrowTargets || 1);
            if (targets.length > 0) {
                this.arrowCooldown = tier.arrowCD;
                { const hp = humanPlayer?.hero; if (hp) { const _d2 = (hp.x-this.x)**2+(hp.z-this.z)**2; if (_d2 < 900) AudioMgr.arrowShoot(); } }
                for (const target of targets) {
                    if (typeof target.takeDamage === 'function') {
                        target.takeDamage(tier.arrowDmg);
                    } else {
                        target.hp -= tier.arrowDmg;
                    }
                    const tx = target.x || this.x;
                    const tz = target.z || this.z;
                    arrowProjectiles.push(new ArrowProjectile(this.x, 10, this.z, tx, 2, tz, 0xFFFF00));
                }
            }
        }

        // T3+: Bomb attack
        if (tier.hasBomb) {
            this.bombCooldown = Math.max(0, this.bombCooldown - dt);
            if (this.bombCooldown <= 0) {
                const bombTarget = this._findBombTarget(tier.bombRange);
                if (bombTarget) {
                    this.bombCooldown = tier.bombCD;
                    { const hp = humanPlayer?.hero; if (hp) { const _d2 = (hp.x-this.x)**2+(hp.z-this.z)**2; if (_d2 < 900) AudioMgr.bombLaunch(); } }
                    // Lead prediction: aim where target will be in 0.6s
                    let btx = bombTarget.x, btz = bombTarget.z;
                    const ft = 0.6;
                    if (bombTarget.marchTarget) {
                        // Soldier: predict movement toward march target
                        const dx = bombTarget.marchTarget.x - bombTarget.x;
                        const dz = bombTarget.marchTarget.z - bombTarget.z;
                        const d = Math.sqrt(dx*dx + dz*dz);
                        if (d > 1) { btx += (dx/d) * (bombTarget.speed || 6) * ft; btz += (dz/d) * (bombTarget.speed || 6) * ft; }
                    } else if (bombTarget.angle !== undefined) {
                        // Hero: predict based on angle
                        btx += Math.sin(bombTarget.angle) * CONFIG.heroSpeed * ft;
                        btz -= Math.cos(bombTarget.angle) * CONFIG.heroSpeed * ft;
                    }
                    bombProjectiles.push(new BombProjectile(
                        this.x, 12, this.z, btx, btz,
                        tier.bombDmg, tier.bombRadius, this.baseId
                    ));
                }
            }
        }

        // T2+: Slow zone — damage + slow enemies within radius
        if (tier.hasSlowZone) {
            for (const s of soldiers) {
                if (s.playerId === this.baseId || s.hp <= 0) continue;
                const dx = s.x - this.x, dz = s.z - this.z;
                if (dx*dx + dz*dz < tier.slowRadius * tier.slowRadius) {
                    s.takeDamage(tier.slowDPS * dt);
                    // Slow is applied in soldier update via base proximity check
                }
            }
            for (const p of players) {
                if (p.id === this.baseId || !p.hero) continue;
                const dx = p.hero.x - this.x, dz = p.hero.z - this.z;
                if (dx*dx + dz*dz < tier.slowRadius * tier.slowRadius) {
                    p.hero.takeDamage(tier.slowDPS * dt);
                }
            }
        }

        // T4: Wall rebuild timer
        for (const wall of this.walls) {
            if (wall.destroyed) {
                wall.rebuildTimer -= dt;
                if (wall.rebuildTimer <= 0) {
                    wall.destroyed = false;
                    wall.hp = wall.maxHP;
                    wall.mesh.visible = true;
                    spawnParticles(wall.x, 2, wall.z, 0x888888, 5);
                }
            }
        }

        // Pulse slow zone opacity for visual effect
        if (this.slowZoneMesh) {
            this.slowZoneMesh.material.opacity = 0.15 + Math.sin(Date.now() * 0.003) * 0.05;
        }
    }

    remove() {
        if (this.group && this.group.parent) scene.remove(this.group);
        if (this.slowZoneMesh && this.slowZoneMesh.parent) {
            scene.remove(this.slowZoneMesh);
            this.slowZoneMesh.geometry.dispose();
            this.slowZoneMesh.material.dispose();
        }
        for (const wall of this.walls) {
            if (wall.mesh && wall.mesh.parent) scene.remove(wall.mesh);
        }
        this.walls = [];
        this.healthBar.remove();
    }
}


class Player {
    constructor(id, color) {
        this.id = id;
        this.color = color;
        this.baseX = 0;
        this.baseZ = 0;
        this.hero = null;
        this.base = null;
        this.isHuman = false;
        this.respawnTimer = 0;
        this.gold = 0;
        this.eliminated = false;
        this.aiMoveX = 0;
        this.aiMoveZ = 0;
        this.aiStrategy = null; // 'expansion', 'return_to_territory', 'return_to_base'
    }

    setBasePosition(x, z) {
        this.baseX = x;
        this.baseZ = z;
    }

    createHero() {
        this.hero = new Hero(this.id, this.baseX, this.baseZ, this.color);
        // Restore skill model if player has skills
        const ss = playerSkillStates[this.id];
        if (ss && ss.skills.length > 0) {
            const bestKey = _getBestModelKey(ss);
            if (bestKey) this.hero.upgradeModel(bestKey);
        }
    }

    createBase() {
        this.base = new Base(this.baseX, this.baseZ, this.color, this.id);
    }

    update(dt) {
        if (this.base) {
            this.base.update(dt);
        }

        // Only respawn if base is alive
        if (this.respawnTimer > 0 && this.base && this.base.hp > 0) {
            this.respawnTimer -= dt;
            if (this.respawnTimer <= 0) {
                this.createHero();
                if (this.id === 1) AudioMgr.respawn();
            }
        }
    }
}

const players = [];
let humanPlayer = null;

function setupPlayers() {
    // Remove old heroes, bases, and their scene objects before creating new ones
    for (const p of players) {
        if (p.hero) p.hero.remove();
        if (p.base) p.base.remove();
    }
    players.length = 0;

    // Clear old gold mines
    for (const mine of goldMines) {
        mine.remove();
    }
    goldMines.length = 0;
    spawnGoldMines();

    const mapHalf = CONFIG.mapSize / 2 - 60;
    const fixedPositions = [
        { x: -mapHalf, z: -mapHalf },
        { x: mapHalf, z: -mapHalf },
        { x: mapHalf, z: mapHalf },
        { x: -mapHalf, z: mapHalf }
    ];

    // Shuffle positions so players spawn at random fixed locations each game
    const positions = [...fixedPositions];
    for (let i = positions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [positions[i], positions[j]] = [positions[j], positions[i]];
    }

    for (let i = 0; i < CONFIG.numPlayers; i++) {
        const player = new Player(i + 1, CONFIG.playerColors[i]);
        player.setBasePosition(positions[i].x, positions[i].z);
        player.createHero();
        player.createBase();

        if (i === 0) {
            player.isHuman = true;
            humanPlayer = player;
        }
        players.push(player);

        const coords = territoryGrid.getGridCoords(positions[i].x, positions[i].z);
        territoryGrid.initializeTerritory(i + 1, coords.gx, coords.gz);
    }

    territoryGrid.redraw();

    // Initialize InstancedMeshes for soldier rendering (1 draw call per player)
    for (const player of players) {
        getOrCreateSoldierInstancedMesh(player.id, player.color);
    }
}

let territoryLeaderId = 0; // track who has most territory for gold x2 buff
let prevHumanTerritoryPercent = -1; // track human player territory % for gold income notification (-1 = first frame skip)

function updateTerritoryDisplay() {
    const total = CONFIG.gridSize * CONFIG.gridSize;
    let html = '<div style="font-weight: bold; margin-bottom: 8px; text-align:right;">TERRITORY</div>';

    // Build sorted player data
    const playerData = [];
    let maxCount = 0;
    territoryLeaderId = 0;
    for (const player of players) {
        const count = territoryGrid.getTerritoryCount(player.id);
        const percent = Math.floor((count / total) * 100);
        playerData.push({ player, count, percent });
        if (count > maxCount && player.base && player.base.hp > 0) {
            maxCount = count;
            territoryLeaderId = player.id;
        }
    }

    // Sort by territory count descending (strongest on top)
    playerData.sort((a, b) => b.count - a.count);

    for (const { player, percent } of playerData) {
        const hex = player.color.toString(16).padStart(6, '0');
        const isLeader = player.id === territoryLeaderId;
        const goldBuff = isLeader ? '<span style="color:#FFD700">★×2 </span>' : '';
        const dead = (!player.base || player.base.hp <= 0) ? '<span style="color:#666">☠ </span>' : '';
        html += `<div class="territory-stat" style="color: #${hex};">${dead}${goldBuff}P${player.id}: ${percent}%</div>`;

        // Track human player territory % for gold income notification
        if (player.isHuman) {
            if (prevHumanTerritoryPercent >= 0 && percent > prevHumanTerritoryPercent) {
                const gMult = (player.id === territoryLeaderId) ? 2 : 1;
                const goldPerSec = percent * gMult;
                showGoldIncomeNotification(goldPerSec);
            }
            prevHumanTerritoryPercent = percent;
        }
    }

    document.getElementById('territory-display').innerHTML = html;
}
